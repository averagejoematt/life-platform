    .nf-main { min-height: 72vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: var(--sp-8) var(--sp-4); }
    .nf-kicker { color: var(--ember); }
    .nf-h { font-family: var(--font-serif); font-size: clamp(4rem, 14vw, 7rem); line-height: 1;
      color: var(--ink); margin: var(--sp-3) 0; }
    .nf-sub { color: var(--ink-muted); max-width: 44ch; line-height: var(--lh-relaxed); }

<body>
  <a class="skip" href="#main">Skip to content</a>
  <header class="story-top">
    <a class="brand" href="/"><span class="brand-mark" aria-hidden="true"></span><span class="brand-name">averagejoematt</span></a>

  <main id="main" class="nf-main">
    <p class="nf-kicker label">signal lost</p>

  <footer class="story-foot">
    <span class="label">averagejoematt · the measured life</span>
  </footer>

  <script>
    (function(){
      var tb = document.querySelector(".theme-toggle");
      if (tb) tb.addEventListener("click", function(){
        var cur = document.documentElement.dataset.theme || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.dataset.theme = cur === "light" ? "dark" : "light";
        try { localStorage.setItem("ajm-theme", document.documentElement.dataset.theme); } catch (e) {}
      });
    })();
  </script>
</body>
