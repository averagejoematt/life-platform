<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>.nav-overlay{display:none}</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Pulse — daily glanceable state from 19 data sources. Scale, water, movement, lift, recovery, sleep, journal, mind.">
  <meta property="og:image" content="https://averagejoematt.com/assets/images/og-image.png">
  <meta property="og:image:width" content="1200"><meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta property="og:title" content="The Pulse — Matthew Walker">
  <meta property="og:description" content="Am I having a good day or a bad day? 8 signals, one glance.">
  <title>The Pulse — Matthew Walker</title>
  <link rel="alternate" type="application/rss+xml" title="The Measured Life" href="/rss.xml">
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    /* ─── PULSE: Layer 1 — Headline ─── */
    .pulse-hero {
      padding-top: var(--nav-height);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .pulse-hero__inner {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: var(--space-10) var(--page-padding) var(--space-8);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--space-8);
      align-items: start;
    }
    .pulse-day {
      text-align: center;
      min-width: 80px;
    }
    .pulse-day__number {
      font-family: var(--font-display);
      font-size: clamp(56px, 8vw, 96px);
      line-height: 0.85;
      letter-spacing: var(--ls-display);
      color: var(--text);
    }
    .pulse-day__label {
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      letter-spacing: var(--ls-tag);
      text-transform: uppercase;
      color: var(--text-faint);
      margin-top: var(--space-1);
    }
    .pulse-state {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .pulse-status {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .pulse-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse-breathe 3s ease-in-out infinite;
    }
    .pulse-dot--strong { background: var(--c-green-500); }
    .pulse-dot--mixed  { background: var(--c-yellow-status); animation-duration: 2s; }
    .pulse-dot--quiet  { background: #3a5a48; animation-duration: 5s; }
    @keyframes pulse-breathe { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .pulse-word {
      font-family: var(--font-display);
      font-size: var(--text-h3);
      letter-spacing: var(--ls-heading);
      text-transform: uppercase;
    }
    .pulse-word--strong { color: var(--c-green-500); }
    .pulse-word--mixed  { color: var(--c-yellow-status); }
    .pulse-word--quiet  { color: #3a5a48; }

    .pulse-narrative {
      font-family: var(--font-serif);
      font-size: var(--text-lg);
      line-height: var(--lh-body);
      color: var(--text-muted);
      max-width: var(--prose-width);
    }
    .pulse-date {
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      letter-spacing: var(--ls-tag);
      color: var(--text-faint);
      text-transform: uppercase;
    }
    .pulse-nav {
      display: flex; gap: var(--space-4); margin-top: var(--space-2);
    }
    .pulse-nav__btn {
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      color: var(--text-faint);
      text-decoration: none;
      letter-spacing: var(--ls-tag);
      opacity: 0.5;
      cursor: not-allowed;
    }
    .pulse-nav__btn.is-active { opacity: 1; cursor: pointer; color: var(--accent-dim); }
    .pulse-nav__btn.is-active:hover { color: var(--accent); }

    /* ─── PULSE: Layer 2 — Glyph Strip ─── */
    .glyph-strip {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .glyph-strip__inner {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: var(--space-6) var(--page-padding);
      display: flex;
      justify-content: space-between;
      gap: var(--space-4);
      min-width: 600px;
    }
    .glyph {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      cursor: pointer;
      transition: transform var(--dur-fast) var(--ease-out);
      flex: 1;
      max-width: 80px;
    }
    .glyph:hover { transform: translateY(-2px); }
    .glyph.is-selected .glyph__ring { box-shadow: 0 0 0 2px var(--accent); }

    .glyph__ring {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color var(--dur-mid), box-shadow var(--dur-mid);
      background: var(--bg);
    }
    .glyph__ring--green { border-color: var(--c-green-500); }
    .glyph__ring--amber { border-color: var(--c-yellow-status); border-style: dashed; }
    .glyph__ring--red   { border-color: var(--c-red-status); animation: ring-pulse 2s infinite; }
    .glyph__ring--gray  { border-color: var(--border); opacity: 0.5; }
    @keyframes ring-pulse { 0%,100%{border-color:var(--c-red-status)} 50%{border-color:rgba(255,82,82,0.3)} }

    .glyph__icon { width: 24px; height: 24px; }
    .glyph__icon--green { color: var(--c-green-500); }
    .glyph__icon--amber { color: var(--c-yellow-status); }
    .glyph__icon--red   { color: var(--c-red-status); }
    .glyph__icon--gray  { color: var(--text-faint); opacity: 0.4; }

    .glyph__name {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: var(--ls-tag);
      text-transform: uppercase;
      color: var(--text-faint);
      text-align: center;
    }

    /* ─── PULSE: Layer 3 — Detail Cards ─── */
    .detail-section {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: var(--space-8) var(--page-padding);
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-4);
    }
    .detail-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      padding: var(--space-5) var(--space-6);
      transition: border-left-color var(--dur-fast), opacity var(--dur-mid);
    }
    .detail-card--green { border-left-color: var(--c-green-500); }
    .detail-card--amber { border-left-color: var(--c-yellow-status); }
    .detail-card--red   { border-left-color: var(--c-red-status); }
    .detail-card--gray  { border-left-color: var(--border); opacity: 0.6; }
    .detail-card.is-hidden { display: none; }

    .detail-card__header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: var(--space-3);
    }
    .detail-card__name {
      font-size: var(--text-2xs); letter-spacing: var(--ls-tag);
      text-transform: uppercase; color: var(--text-muted);
    }
    .detail-card__state {
      font-family: var(--font-mono); font-size: var(--text-2xs);
      letter-spacing: var(--ls-tag); text-transform: uppercase;
    }
    .detail-card__state--green { color: var(--c-green-500); }
    .detail-card__state--amber { color: var(--c-yellow-status); }
    .detail-card__state--red   { color: var(--c-red-status); }
    .detail-card__state--gray  { color: var(--text-faint); }

    .detail-card__hero {
      display: flex; align-items: baseline; gap: var(--space-2);
      margin-bottom: var(--space-2);
    }
    .detail-card__value {
      font-family: var(--font-display); font-size: 32px;
      letter-spacing: var(--ls-display); color: var(--text); line-height: 1;
    }
    .detail-card__unit {
      font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted);
    }
    .detail-card__sub {
      font-family: var(--font-mono); font-size: var(--text-2xs);
      color: var(--text-faint); margin-bottom: var(--space-3);
    }
    .detail-card__sparkline {
      display: flex; align-items: flex-end; gap: 2px; height: 28px;
    }
    .spark-bar {
      flex: 1; background: var(--accent); opacity: 0.4; border-radius: 1px 1px 0 0;
      min-width: 4px; transition: opacity var(--dur-fast);
    }
    .spark-bar:last-child { opacity: 1; }

    /* ─── JOURNEY: Below fold ─── */
    .journey-section {
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .journey-inner {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: var(--space-16) var(--page-padding) var(--space-12);
    }
    .journey-title {
      font-family: var(--font-display);
      font-size: var(--text-h2);
      letter-spacing: var(--ls-display);
      color: var(--text);
      margin-bottom: var(--space-2);
    }
    .journey-title span { color: var(--accent); }
    .journey-sub {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--text-muted);
      margin-bottom: var(--space-8);
    }
    .journey-stats {
      display: flex; gap: var(--space-8); flex-wrap: wrap; margin-bottom: var(--space-8);
    }
    .j-stat { border-left: 2px solid var(--accent); padding-left: var(--space-4); }
    .j-stat__label {
      font-size: var(--text-2xs); letter-spacing: var(--ls-tag);
      text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--space-1);
    }
    .j-stat__value {
      font-family: var(--font-display); font-size: 28px;
      color: var(--text); letter-spacing: var(--ls-display);
    }

    /* ─── Loading state ─── */
    .pulse-loading {
      text-align: center; padding: var(--space-12);
      font-family: var(--font-mono); font-size: var(--text-xs);
      color: var(--text-faint); letter-spacing: var(--ls-tag);
    }

    /* ─── Responsive ─── */
    @media (max-width: 640px) {
      .pulse-hero__inner { grid-template-columns: 1fr; gap: var(--space-4); text-align: center; }
      .pulse-day { display: flex; align-items: baseline; gap: var(--space-3); justify-content: center; }
      .pulse-day__number { font-size: 48px; }
      .pulse-status { justify-content: center; }
      .pulse-narrative { margin: 0 auto; text-align: center; }
      .pulse-date, .pulse-nav { justify-content: center; }
      .glyph-strip__inner { min-width: 520px; padding: var(--space-4) var(--space-3); gap: var(--space-2); }
      .glyph__ring { width: 44px; height: 44px; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="amj-nav"></div>

  <!-- ═══ LAYER 1: THE PULSE HEADLINE ═══ -->
  <section class="pulse-hero" id="pulse-hero">
    <div class="pulse-hero__inner">
      <div class="pulse-day">
        <div class="pulse-day__number" id="p-day">—</div>
        <div class="pulse-day__label">days</div>
      </div>
      <div class="pulse-state">
        <div class="pulse-status">
          <div class="pulse-dot pulse-dot--quiet" id="p-dot"></div>
          <div class="pulse-word pulse-word--quiet" id="p-word">Loading</div>
        </div>
        <div class="pulse-narrative" id="p-narrative">Fetching today's signal…</div>
        <div class="pulse-date" id="p-date"></div>
        <div class="pulse-nav">
          <span class="pulse-nav__btn" id="p-prev">← Yesterday</span>
          <span class="pulse-nav__btn" id="p-next">Tomorrow →</span>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══ LAYER 2: THE GLYPH STRIP ═══ -->
  <section class="glyph-strip" id="glyph-strip">
    <div class="glyph-strip__inner" id="glyph-container"></div>
  </section>

  <!-- ═══ LAYER 3: DETAIL CARDS ═══ -->
  <section class="detail-section" id="detail-section">
    <div class="detail-grid" id="detail-grid"></div>
  </section>

  <!-- ═══ THE JOURNEY (below fold) ═══ -->
  <section class="journey-section" id="journey-section">
    <div class="journey-inner">
      <div class="journey-title">THE <span>JOURNEY</span> SO FAR</div>
      <div class="journey-sub" id="j-sub">Loading journey data…</div>
      <div class="journey-stats" id="j-stats"></div>
    </div>
  </section>

  <div id="amj-subscribe"></div>
  <div id="amj-bottom-nav"></div>
  <div id="amj-footer"></div>

  <script src="/assets/js/site_constants.js"></script>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/nav.js"></script>
  <script>
  (function() {
    'use strict';

    // ─── SVG Glyph Icons (symbolic, not literal) ────────────────
    var GLYPH_ICONS = {
      scale: function(color) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.5" class="glyph__icon glyph__icon--'+color+'">'
          + '<path d="M12 3L4 10l3 8h10l3-8L12 3z" fill="none"/>'
          + '<path d="M12 3v7" stroke-linecap="round"/>'
          + '<path d="M8 18l4-4 4 4" stroke-linecap="round" stroke-linejoin="round"/>'
          + '</svg>';
      },
      water: function(color) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.5">'
          + '<path d="M12 2C12 2 6 10 6 14a6 6 0 0012 0c0-4-6-12-6-12z"/>'
          + '<line x1="8" y1="14" x2="16" y2="14" opacity="0.3"/>'
          + '<line x1="9" y1="17" x2="15" y2="17" opacity="0.3"/>'
          + '</svg>';
      },
      movement: function(color) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.5">'
          + '<circle cx="4" cy="18" r="2" fill="'+color+'"/>'
          + '<path d="M6 18c2-4 4-6 7-8s5-3 8-7" stroke-linecap="round"/>'
          + '</svg>';
      },
      lift: function(color) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.5">'
          + '<rect x="9" y="14" width="6" height="7" rx="1" fill="'+color+'" opacity="0.15"/>'
          + '<rect x="9" y="8" width="6" height="5" rx="1" fill="'+color+'" opacity="0.25"/>'
          + '<rect x="9" y="3" width="6" height="4" rx="1" fill="'+color+'" opacity="0.4"/>'
          + '<line x1="12" y1="3" x2="12" y2="21" opacity="0.2"/>'
          + '</svg>';
      },
      recovery: function(color) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.5">'
          + '<polyline points="2,13 6,13 8,8 10,18 12,6 14,16 16,11 18,13 22,13" stroke-linecap="round" stroke-linejoin="round"/>'
          + '</svg>';
      },
      sleep: function(color) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.5">'
          + '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>'
          + '<circle cx="17" cy="5" r="0.7" fill="'+color+'"/>'
          + '<circle cx="20" cy="8" r="0.5" fill="'+color+'"/>'
          + '</svg>';
      },
      journal: function(color) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.5">'
          + '<path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>'
          + '<path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>'
          + '<line x1="8" y1="7" x2="16" y2="7" opacity="0.5"/>'
          + '<line x1="8" y1="11" x2="14" y2="11" opacity="0.5"/>'
          + '</svg>';
      },
      mind: function(color) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.5">'
          + '<path d="M12 22c-1-3-4-6-4-10a4 4 0 018 0c0 4-3 7-4 10z" fill="'+color+'" opacity="0.15"/>'
          + '<path d="M12 22c-1-3-4-6-4-10a4 4 0 018 0c0 4-3 7-4 10z"/>'
          + '<circle cx="12" cy="11" r="1.5" fill="'+color+'" opacity="0.6"/>'
          + '</svg>';
      }
    };

    var GLYPH_ORDER = ['scale','water','movement','lift','recovery','sleep','journal','mind'];
    var GLYPH_LABELS = {scale:'Scale',water:'Water',movement:'Move',lift:'Lift',recovery:'Recovery',sleep:'Sleep',journal:'Journal',mind:'Mind'};

    var STATE_COLORS = {
      green: 'var(--c-green-500)',
      amber: 'var(--c-yellow-status)',
      red:   'var(--c-red-status)',
      gray:  'var(--text-faint)'
    };

    // ─── Sparkline renderer ─────────────────────────────────────
    function renderSparkline(values, state) {
      if (!values || values.length === 0) return '';
      var clean = values.filter(function(v) { return v !== null && v !== undefined; });
      if (clean.length === 0) return '';
      var max = Math.max.apply(null, clean);
      var min = Math.min.apply(null, clean);
      var range = max - min || 1;
      var html = '<div class="detail-card__sparkline">';
      clean.forEach(function(v, i) {
        var pct = Math.max(8, ((v - min) / range) * 100);
        var isLast = i === clean.length - 1;
        html += '<div class="spark-bar" style="height:' + pct + '%;opacity:' + (isLast ? '1' : '0.35') + ';background:' + (STATE_COLORS[state] || 'var(--accent)') + '"></div>';
      });
      html += '</div>';
      return html;
    }

    // ─── Detail card content builders ───────────────────────────
    var DETAIL_BUILDERS = {
      scale: function(g) {
        var v = g.value ? g.value.toFixed(1) : '—';
        var u = g.value ? 'lbs' : '';
        var sub = g.delta_label || g.journey_summary || 'No weigh-in data';
        return { value: v, unit: u, sub: sub, sparkline: g.sparkline_7d };
      },
      water: function(g) {
        return { value: g.liters ? g.liters.toFixed(1) : '—', unit: g.liters ? 'L' : '', sub: g.label || 'Not yet tracked', sparkline: g.sparkline_7d };
      },
      movement: function(g) {
        var v = g.steps ? g.steps.toLocaleString() : (g.zone2_week_min > 0 ? g.zone2_week_min : '—');
        var u = g.steps ? 'steps' : (g.zone2_week_min > 0 ? 'min Z2' : '');
        var sub = g.activity_type || ('Z2 this week: ' + (g.zone2_week_min || 0) + '/150 min');
        return { value: v, unit: u, sub: sub, sparkline: g.sparkline_7d };
      },
      lift: function(g) {
        return { value: g.trained_today ? '✓' : 'Rest', unit: '', sub: g.workout_type || 'Rest day', sparkline: [] };
      },
      recovery: function(g) {
        var v = g.recovery_pct ? g.recovery_pct + '' : '—';
        var sub = [];
        if (g.hrv_ms) sub.push('HRV ' + g.hrv_ms + 'ms');
        if (g.rhr_bpm) sub.push('RHR ' + Math.round(g.rhr_bpm));
        if (g.status_label) sub.push(g.status_label);
        return { value: v, unit: g.recovery_pct ? '%' : '', sub: sub.join(' · ') || 'No Whoop data', sparkline: g.sparkline_7d };
      },
      sleep: function(g) {
        return { value: g.hours ? g.hours.toFixed(1) : '—', unit: g.hours ? 'hrs' : '', sub: g.score ? 'Score: ' + g.score : 'Duration only', sparkline: g.sparkline_7d };
      },
      journal: function(g) {
        var v = g.written_today ? 'Open' : 'Closed';
        var sub = g.themes && g.themes.length > 0 ? g.themes.join(', ') : (g.written_today ? 'Entry logged' : 'No entry today');
        return { value: v, unit: '', sub: sub, sparkline: [] };
      },
      mind: function(g) {
        return { value: g.score ? g.score + '' : '—', unit: g.score ? '/ 5' : '', sub: g.label || 'Not tracked today', sparkline: g.sparkline_7d };
      }
    };

    // ─── Render Layer 2: Glyph Strip ────────────────────────────
    function renderGlyphs(glyphs) {
      var container = document.getElementById('glyph-container');
      container.innerHTML = '';
      GLYPH_ORDER.forEach(function(key) {
        var g = glyphs[key] || { state: 'gray' };
        var state = g.state || 'gray';
        var color = STATE_COLORS[state] || STATE_COLORS.gray;
        var iconFn = GLYPH_ICONS[key];
        var iconSvg = iconFn ? iconFn(color) : '';

        var el = document.createElement('div');
        el.className = 'glyph';
        el.setAttribute('data-glyph', key);
        el.innerHTML =
          '<div class="glyph__ring glyph__ring--' + state + '">' + iconSvg + '</div>' +
          '<div class="glyph__name">' + GLYPH_LABELS[key] + '</div>';
        el.addEventListener('click', function() { toggleDetail(key); });
        container.appendChild(el);
      });
    }

    // ─── Render Layer 3: Detail Cards ───────────────────────────
    function renderDetails(glyphs) {
      var grid = document.getElementById('detail-grid');
      grid.innerHTML = '';
      GLYPH_ORDER.forEach(function(key) {
        var g = glyphs[key] || { state: 'gray' };
        var state = g.state || 'gray';
        var builder = DETAIL_BUILDERS[key];
        var d = builder ? builder(g) : { value: '—', unit: '', sub: '', sparkline: [] };

        var stateLabel = state.charAt(0).toUpperCase() + state.slice(1);
        var card = document.createElement('div');
        card.className = 'detail-card detail-card--' + state;
        card.setAttribute('data-detail', key);
        card.innerHTML =
          '<div class="detail-card__header">' +
            '<div class="detail-card__name">' + GLYPH_LABELS[key] + '</div>' +
            '<div class="detail-card__state detail-card__state--' + state + '">' + stateLabel + '</div>' +
          '</div>' +
          '<div class="detail-card__hero">' +
            '<div class="detail-card__value">' + d.value + '</div>' +
            '<div class="detail-card__unit">' + d.unit + '</div>' +
          '</div>' +
          '<div class="detail-card__sub">' + d.sub + '</div>' +
          renderSparkline(d.sparkline, state);

        grid.appendChild(card);
      });
    }

    // ─── Toggle detail card (glyph click) ───────────────────────
    var selectedGlyph = null;
    function toggleDetail(key) {
      var glyphs = document.querySelectorAll('.glyph');
      var cards = document.querySelectorAll('.detail-card');

      if (selectedGlyph === key) {
        // Deselect — show all
        selectedGlyph = null;
        glyphs.forEach(function(g) { g.classList.remove('is-selected'); });
        cards.forEach(function(c) { c.classList.remove('is-hidden'); });
        return;
      }

      selectedGlyph = key;
      glyphs.forEach(function(g) {
        g.classList.toggle('is-selected', g.getAttribute('data-glyph') === key);
      });
      cards.forEach(function(c) {
        c.classList.toggle('is-hidden', c.getAttribute('data-detail') !== key);
      });

      // Scroll card into view
      var card = document.querySelector('[data-detail="' + key + '"]');
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ─── Format date nicely ─────────────────────────────────────
    function formatDate(dateStr) {
      try {
        var d = new Date(dateStr + 'T12:00:00');
        return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      } catch(e) { return dateStr; }
    }

    // ─── Render Layer 1: Headline ───────────────────────────────
    function renderHeadline(pulse) {
      document.getElementById('p-day').textContent = pulse.day_number || '—';
      document.getElementById('p-date').textContent = formatDate(pulse.date);

      var status = pulse.status || 'quiet';
      var dot = document.getElementById('p-dot');
      dot.className = 'pulse-dot pulse-dot--' + status;
      var word = document.getElementById('p-word');
      word.className = 'pulse-word pulse-word--' + status;
      word.textContent = status.charAt(0).toUpperCase() + status.slice(1);

      document.getElementById('p-narrative').textContent = pulse.narrative || 'No signal yet.';
    }

    // ─── Render Journey Stats (below fold) ──────────────────────
    function renderJourney(pulse) {
      var scale = (pulse.glyphs || {}).scale || {};
      if (!scale.value) {
        document.getElementById('j-sub').textContent = 'Weight data populates after first weigh-in.';
        return;
      }
      var lost = scale.journey_summary || '';
      document.getElementById('j-sub').textContent = 'From 302 lbs · Goal: 185 lbs · ' + (lost || 'In progress');

      var stats = document.getElementById('j-stats');
      var items = [
        { label: 'Current', value: scale.value ? scale.value.toFixed(1) + ' lbs' : '—' },
        { label: 'Day', value: pulse.day_number || '—' },
        { label: 'Signals', value: (pulse.signals_reporting || 0) + ' / ' + (pulse.signals_total || 8) },
      ];
      stats.innerHTML = '';
      items.forEach(function(item) {
        stats.innerHTML +=
          '<div class="j-stat">' +
            '<div class="j-stat__label">' + item.label + '</div>' +
            '<div class="j-stat__value">' + item.value + '</div>' +
          '</div>';
      });
    }

    // ─── Fetch and render ───────────────────────────────────────
    var API_BASE = (typeof AMJ !== 'undefined' && AMJ.API_BASE) ? AMJ.API_BASE : '';

    fetch(API_BASE + '/api/pulse')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var pulse = data.pulse || data;
        renderHeadline(pulse);
        renderGlyphs(pulse.glyphs || {});
        renderDetails(pulse.glyphs || {});
        renderJourney(pulse);
      })
      .catch(function(err) {
        console.error('[pulse] fetch failed:', err);
        document.getElementById('p-narrative').textContent = 'Could not load today\'s pulse. Refresh to try again.';
      });
  })();
  </script>
