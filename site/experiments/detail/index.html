<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>.nav-overlay{display:none}</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- F3: og:meta — static fallbacks; JS updates document.title dynamically -->
  <meta name="description" content="Detailed experiment view — evidence, protocol, results, and live data from the N=1 experiment library.">
  <meta property="og:title" content="Experiment Detail — The Lab">
  <meta property="og:description" content="Evidence-based N=1 experiment — hypothesis, protocol, metrics, and results.">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://averagejoematt.com/experiments/detail/">
  <meta property="og:image" content="https://averagejoematt.com/assets/images/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <title>Experiment Detail — The Lab</title>
  <link rel="alternate" type="application/rss+xml" title="The Measured Life" href="/rss.xml">
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#080c0a">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    .detail-page {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--space-16) var(--page-padding) var(--space-16);
    }
    .detail-back {
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      display: inline-block;
      margin-bottom: var(--space-8);
    }
    .detail-back:hover { color: var(--accent); }

    .detail-header {
      border: 1px solid var(--border);
      background: var(--surface);
      padding: var(--space-10) var(--space-8);
      margin-bottom: var(--space-8);
    }
    .detail-header__pillar {
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      color: var(--accent-dim);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      margin-bottom: var(--space-4);
    }
    .detail-header__name {
      font-family: var(--font-display);
      font-size: var(--text-h2);
      color: var(--text);
      line-height: var(--lh-display);
      margin-bottom: var(--space-4);
    }
    .detail-header__desc {
      font-size: var(--text-sm);
      color: var(--text-muted);
      line-height: var(--lh-body);
      margin-bottom: var(--space-6);
    }
    .detail-header__meta {
      display: flex;
      gap: var(--space-6);
      flex-wrap: wrap;
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      color: var(--text-muted);
    }
    .detail-header__meta span { display: flex; align-items: center; gap: var(--space-2); }

    .detail-chips {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-top: var(--space-6);
    }
    .detail-chip {
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: var(--space-1) var(--space-4);
      letter-spacing: var(--ls-label);
    }
    .detail-chip--evidence { color: var(--accent-dim); border-color: var(--accent-dim); }
    .detail-chip--type { color: var(--c-amber-400, #F59E0B); border-color: var(--c-amber-300, #FCD34D); }
    .detail-chip--status { color: #2EA98F; border-color: rgba(46,169,143,0.3); }

    .detail-section {
      border: 1px solid var(--border);
      background: var(--surface);
      padding: var(--space-8);
      margin-bottom: var(--space-6);
    }
    .detail-section__title {
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      color: var(--accent-dim);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      margin-bottom: var(--space-4);
    }
    .detail-section__body {
      font-size: var(--text-sm);
      color: var(--text-muted);
      line-height: var(--lh-body);
    }

    .detail-actions {
      display: flex;
      gap: var(--space-4);
      margin-bottom: var(--space-8);
    }
    .detail-vote-btn, .detail-follow-btn {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      padding: var(--space-3) var(--space-6);
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .detail-vote-btn {
      color: var(--text);
      background: transparent;
      border: 1px solid var(--accent-dim);
    }
    .detail-vote-btn:hover { background: rgba(46,169,143,0.1); }
    .detail-vote-btn.voted { color: var(--accent); border-color: var(--accent); }
    .detail-follow-btn {
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
    }
    .detail-follow-btn:hover { border-color: var(--accent-dim); color: var(--accent-dim); }
    .detail-follow-btn.followed { color: var(--accent); border-color: var(--accent-dim); }

    .detail-runs { margin-top: var(--space-8); }
    .detail-run {
      border: 1px solid var(--border);
      background: var(--surface);
      padding: var(--space-6) var(--space-8);
      margin-bottom: var(--space-4);
    }
    .detail-run__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-4);
    }
    .detail-run__status {
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      padding: var(--space-1) var(--space-3);
      border: 1px solid;
    }
    .detail-run__status--active { color: var(--accent); border-color: var(--accent-dim); }
    .detail-run__status--completed { color: #2EA98F; border-color: rgba(46,169,143,0.3); }
    .detail-run__status--abandoned { color: var(--text-muted); border-color: var(--border); }
    .detail-run__dates {
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      color: var(--text-muted);
    }
    .detail-run__outcome {
      font-size: var(--text-xs);
      color: var(--text-muted);
      line-height: var(--lh-body);
      margin-top: var(--space-3);
    }
    .detail-run__metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-4);
      margin-top: var(--space-4);
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      color: var(--text-muted);
    }
    .detail-run__metric-label { text-transform: uppercase; letter-spacing: var(--ls-label); color: var(--text-faint); }

    .detail-loading {
      text-align: center;
      padding: var(--space-16);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--text-muted);
    }
    .detail-error {
      text-align: center;
      padding: var(--space-16);
      color: var(--text-muted);
    }

    @media (max-width: 640px) {
      .detail-run__metrics { grid-template-columns: 1fr 1fr; }
      .detail-header__meta { flex-direction: column; gap: var(--space-3); }
    }
  </style>
</head>
<body>
<div id="amj-nav"></div>
<nav class="breadcrumb" aria-label="Breadcrumb"><a href="/" class="breadcrumb__section">Home</a><span class="breadcrumb__sep">›</span><a href="/stack/" class="breadcrumb__section">The Practice</a><span class="breadcrumb__sep">›</span><a href="/experiments/" class="breadcrumb__section">Experiments</a><span class="breadcrumb__sep">›</span><span class="breadcrumb__current">Detail</span></nav>

<div class="detail-page" id="detail-page">
  <a href="/experiments/" class="detail-back">← Back to The Lab</a>
  <div class="detail-loading" id="detail-loading">Loading experiment...</div>
  <div id="detail-content" style="display:none"></div>
  <div class="detail-error" id="detail-error" style="display:none"></div>
</div>

<div id="amj-subscribe"></div>
<div id="amj-bottom-nav"></div>
<div id="amj-reading-path"></div>
<div id="amj-footer"></div>

<script>
(function() {
  'use strict';

  var API = 'https://averagejoematt.com/api';
  var PILLAR_ICONS = {sleep:'☾',movement:'◎',nutrition:'⚘',supplements:'⬡',mental:'◈',social:'◇',discipline:'▣'};
  var EVIDENCE_DOTS = {strong:'●●●',moderate:'●●',emerging:'●'};
  var EVIDENCE_LABEL = {strong:'Strong evidence',moderate:'Moderate evidence',emerging:'Emerging evidence'};

  // Get experiment ID from query string
  var params = new URLSearchParams(window.location.search);
  var expId = params.get('id');

  if (!expId) {
    document.getElementById('detail-loading').style.display = 'none';
    document.getElementById('detail-error').style.display = 'block';
    document.getElementById('detail-error').innerHTML = '<p>No experiment specified.</p><p><a href="/experiments/" style="color:var(--accent)">← Back to The Lab</a></p>';
    return;
  }

  function formatDate(s) {
    if (!s) return '—';
    try { return new Date(s+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).toUpperCase(); }
    catch(e) { return s; }
  }

  fetch(API + '/experiment_detail?id=' + encodeURIComponent(expId))
    .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function(data) {
      document.getElementById('detail-loading').style.display = 'none';
      document.getElementById('detail-content').style.display = 'block';

      var exp = data;

      // F3: Update page title and og:meta dynamically
      document.title = exp.name + ' — Experiment Detail';
      var ogTitle = document.querySelector('meta[property="og:title"]');
      if (ogTitle) ogTitle.setAttribute('content', exp.name + ' — N=1 Experiment');
      var ogDesc = document.querySelector('meta[property="og:description"]');
      if (ogDesc) ogDesc.setAttribute('content', exp.description || exp.hypothesis_template || '');

      var pillarIcon = PILLAR_ICONS[exp.pillar] || '◆';
      var pillarLabel = exp.pillar_label || (exp.pillar || '').charAt(0).toUpperCase() + (exp.pillar || '').slice(1);
      var evidDots = EVIDENCE_DOTS[exp.evidence_tier] || '●';
      var evidLabel = EVIDENCE_LABEL[exp.evidence_tier] || exp.evidence_tier || 'Unknown';

      var html = '';

      // Header
      html += '<div class="detail-header">';
      html += '<div class="detail-header__pillar">' + pillarIcon + ' ' + pillarLabel + '</div>';
      html += '<div class="detail-header__name">' + exp.name + '</div>';
      html += '<div class="detail-header__desc">' + (exp.description || '') + '</div>';
      html += '<div class="detail-header__meta">';
      html += '<span>' + evidDots + ' ' + evidLabel + '</span>';
      html += '<span>' + (exp.suggested_duration_days || '?') + ' days suggested</span>';
      html += '<span>' + (exp.difficulty || 'medium') + '</span>';
      html += '<span>' + (exp.experiment_type === 'behavioral' ? 'Behavioral' : 'Measurable') + '</span>';
      html += '<span>▲ ' + (exp.votes || 0) + ' votes</span>';
      html += '<span>' + (exp.follower_count || 0) + ' followers</span>';
      html += '</div>';

      // Chips
      html += '<div class="detail-chips">';
      if (exp.duration_tier) html += '<span class="detail-chip">' + exp.duration_tier + '</span>';
      (exp.tags || []).forEach(function(t) { html += '<span class="detail-chip">' + t + '</span>'; });
      html += '<span class="detail-chip detail-chip--evidence">' + (exp.evidence_tier || 'unknown') + '</span>';
      html += '<span class="detail-chip detail-chip--type">' + (exp.experiment_type || 'unknown') + '</span>';
      if (exp.active_run) html += '<span class="detail-chip detail-chip--status">Active now</span>';
      html += '</div>';
      html += '</div>';

      // Actions
      var votedSet = {};
      try { votedSet = JSON.parse(localStorage.getItem('amj_exp_votes') || '{}'); } catch(e) {}
      var isVoted = votedSet[expId];
      html += '<div class="detail-actions">';
      html += '<button class="detail-vote-btn' + (isVoted ? ' voted' : '') + '" id="detail-vote-btn">▲ Vote' + (isVoted ? 'd' : '') + ' (' + (exp.votes || 0) + ')</button>';
      html += '<button class="detail-follow-btn" id="detail-follow-btn">✉ Follow this experiment</button>';
      html += '</div>';

      // Why it matters
      if (exp.why_it_matters) {
        html += '<div class="detail-section">';
        html += '<div class="detail-section__title">Why it matters</div>';
        html += '<div class="detail-section__body">' + exp.why_it_matters + '</div>';
        html += '</div>';
      }

      // Evidence
      if (exp.evidence_summary || exp.evidence_citation) {
        html += '<div class="detail-section">';
        html += '<div class="detail-section__title">Evidence</div>';
        html += '<div class="detail-section__body">';
        if (exp.evidence_summary) html += '<p>' + exp.evidence_summary + '</p>';
        if (exp.evidence_citation) html += '<p style="font-style:italic;color:var(--text-faint);margin-top:var(--space-3)">— ' + exp.evidence_citation + '</p>';
        html += '</div></div>';
      }

      // Protocol template
      if (exp.protocol_template) {
        html += '<div class="detail-section">';
        html += '<div class="detail-section__title">Protocol</div>';
        html += '<div class="detail-section__body">' + exp.protocol_template + '</div>';
        html += '</div>';
      }

      // Hypothesis template
      if (exp.hypothesis_template) {
        html += '<div class="detail-section">';
        html += '<div class="detail-section__title">Hypothesis template</div>';
        html += '<div class="detail-section__body" style="font-style:italic">' + exp.hypothesis_template + '</div>';
        html += '</div>';
      }

      // Metrics
      var metrics = (exp.metrics_measurable || []).concat(exp.metrics_behavioral || []);
      if (metrics.length) {
        html += '<div class="detail-section">';
        html += '<div class="detail-section__title">Metrics tracked</div>';
        html += '<div class="detail-section__body">' + metrics.join(' · ') + '</div>';
        html += '</div>';
      }

      // Past runs
      var runs = exp.runs || [];
      if (runs.length) {
        html += '<div class="detail-runs">';
        html += '<div class="detail-section__title" style="margin-bottom:var(--space-6)">Past runs (' + runs.length + ')</div>';
        runs.forEach(function(run, i) {
          var statusClass = run.status === 'active' ? 'active' : run.status === 'completed' ? 'completed' : 'abandoned';
          var gradeStr = run.grade ? (' · ' + run.grade) : '';
          html += '<div class="detail-run">';
          html += '<div class="detail-run__header">';
          html += '<span class="detail-run__status detail-run__status--' + statusClass + '">' + run.status + gradeStr + '</span>';
          html += '<span class="detail-run__dates">' + formatDate(run.start_date) + ' → ' + formatDate(run.end_date) + (run.days != null ? ' (' + run.days + 'd)' : '') + '</span>';
          html += '</div>';

          if (run.hypothesis) {
            html += '<div style="font-size:var(--text-xs);color:var(--text-muted);font-style:italic;margin-bottom:var(--space-3)">' + run.hypothesis + '</div>';
          }

          // Metrics grid
          html += '<div class="detail-run__metrics">';
          if (run.primary_metric) {
            html += '<div><div class="detail-run__metric-label">Primary metric</div>' + run.primary_metric + '</div>';
          }
          if (run.baseline_value != null) {
            html += '<div><div class="detail-run__metric-label">Baseline</div>' + run.baseline_value + '</div>';
          }
          if (run.result_value != null) {
            html += '<div><div class="detail-run__metric-label">Result</div>' + run.result_value + '</div>';
          }
          if (run.compliance_pct != null) {
            html += '<div><div class="detail-run__metric-label">Compliance</div>' + run.compliance_pct + '%</div>';
          }
          if (run.iteration && run.iteration > 1) {
            html += '<div><div class="detail-run__metric-label">Iteration</div>#' + run.iteration + '</div>';
          }
          html += '</div>';

          if (run.outcome) {
            html += '<div class="detail-run__outcome"><strong>Outcome:</strong> ' + run.outcome + '</div>';
          }
          if (run.mechanism) {
            html += '<div class="detail-run__outcome"><strong>Mechanism:</strong> ' + run.mechanism + '</div>';
          }
          if (run.key_finding) {
            html += '<div class="detail-run__outcome"><strong>Finding:</strong> ' + run.key_finding + '</div>';
          }
          if (run.reflection) {
            html += '<div class="detail-run__outcome" style="font-style:italic"><strong>Reflection:</strong> "' + run.reflection + '"</div>';
          }

          html += '</div>';
        });
        html += '</div>';
      } else {
        html += '<div class="detail-section">';
        html += '<div class="detail-section__title">Runs</div>';
        html += '<div class="detail-section__body">This experiment hasn\'t been run yet. Vote to move it up the queue!</div>';
        html += '</div>';
      }

      // CTA
      html += '<div style="text-align:center;margin-top:var(--space-12);padding:var(--space-8);border:1px solid var(--border);background:var(--surface)">';
      html += '<div style="font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--accent-dim);letter-spacing:var(--ls-label);text-transform:uppercase;margin-bottom:var(--space-3)">Try it yourself</div>';
      html += '<div style="font-size:var(--text-sm);color:var(--text-muted);line-height:var(--lh-body)">No app needed. Follow the protocol above for ' + (exp.suggested_duration_days || 30) + ' days and track what changes.</div>';
      html += '</div>';

      document.getElementById('detail-content').innerHTML = html;

      // Wire vote button
      var voteBtn = document.getElementById('detail-vote-btn');
      if (voteBtn && !isVoted) {
        voteBtn.addEventListener('click', function() {
          voteBtn.classList.add('voted');
          var count = (exp.votes || 0) + 1;
          voteBtn.textContent = '▲ Voted (' + count + ')';
          votedSet[expId] = true;
          try { localStorage.setItem('amj_exp_votes', JSON.stringify(votedSet)); } catch(e) {}
          fetch(API + '/experiment_vote', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ library_id: expId })
          }).catch(function() {});
        });
      }

      // Wire follow button
      var followBtn = document.getElementById('detail-follow-btn');
      if (followBtn) {
        followBtn.addEventListener('click', function() {
          if (followBtn.classList.contains('followed')) return;
          var email = prompt('Get notified when this experiment completes. Enter your email:');
          if (!email || email.indexOf('@') < 0) return;
          followBtn.classList.add('followed');
          followBtn.textContent = '✓ Following';
          fetch(API + '/experiment_follow', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ library_id: expId, email: email })
          }).catch(function() {});
        });
      }
    })
    .catch(function(err) {
      document.getElementById('detail-loading').style.display = 'none';
      document.getElementById('detail-error').style.display = 'block';
      document.getElementById('detail-error').innerHTML = '<p>Experiment not found.</p><p><a href="/experiments/" style="color:var(--accent)">← Back to The Lab</a></p>';
    });

})();
</script>
<script src="/assets/js/reveal.js"></script>
<script src="/assets/js/site_constants.js"></script>
<script src="/assets/js/components.js"></script>
<script src="/assets/js/nav.js"></script>
</body>
</html>
