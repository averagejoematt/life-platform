<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!--
    icons.svg — the line-icon sprite. One <symbol> per icon, referenced from the
    host document via <use href="/assets/icons/icons.svg#i-NAME"/> (see icons.js).
    Stroke-based, 24×24, currentColor — so each icon inherits the host element's
    `color`. Honours the design system: no fills, no gloss; an instrument set, not
    decoration. stroke-width 1.5 keeps them sibling-weight to the body type.
  -->
  <!-- ── health domains ─────────────────────────────────────────────── -->
  <symbol id="i-sleep" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 6.5 6.5 0 0 0 21 12.8Z"/>
  </symbol>
  <symbol id="i-training" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 9.5v5M7 7.5v9M17 7.5v9M20 9.5v5M7 12h10"/>
  </symbol>
  <symbol id="i-nutrition" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 3v6M11 3v6M9.5 3v18M8 9h3.5"/>
    <path d="M16 3c-1.3 1.4-1.3 6.6 0 8v10"/>
  </symbol>
  <symbol id="i-vitals" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 20s-7-4.5-7-9.5a4 4 0 0 1 7-2.6 4 4 0 0 1 7 2.6c0 5-7 9.5-7 9.5Z"/>
  </symbol>
  <symbol id="i-glucose" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3c3 4 6 7 6 10.5a6 6 0 0 1-12 0C6 10 9 7 12 3Z"/>
  </symbol>
  <symbol id="i-mind" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8.2"/>
    <path d="M12 8l1.3 2.7 2.7 1.3-2.7 1.3L12 16l-1.3-2.7L8 12l2.7-1.3z"/>
  </symbol>
  <symbol id="i-habits" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 9a8 8 0 0 1 13-2l2 2M19 5v4h-4"/>
    <path d="M20 15a8 8 0 0 1-13 2l-2-2M5 19v-4h4"/>
  </symbol>
  <symbol id="i-people" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM3.5 20a5.5 5.5 0 0 1 11 0"/>
    <path d="M15 5.2a3 3 0 0 1 1 5.8M15.5 14.6A5.5 5.5 0 0 1 20.5 20"/>
  </symbol>
  <!-- ── the five doors ──────────────────────────────────────────────── -->
  <symbol id="i-door-cockpit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 18a8 8 0 0 1 16 0"/><path d="M12 18l4-5"/><circle cx="12" cy="18" r="1.1"/>
  </symbol>
  <symbol id="i-door-data" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 20V11M10 20V5M15 20v-7M20 20v-4M3.5 20h17"/>
  </symbol>
  <symbol id="i-door-coaching" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 17V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H8z"/>
    <path d="M9 9.5h6M9 12h4"/>
  </symbol>
  <symbol id="i-door-protocols" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 3v6l-4.5 8a2 2 0 0 0 1.8 3h11.4a2 2 0 0 0 1.8-3L15 9V3"/>
    <path d="M8 3h8M7.5 15h9"/>
  </symbol>
  <symbol id="i-door-story" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 6.5C10 5 7 4.5 4 5v13c3-.5 6 0 8 1.5 2-1.5 5-2 8-1.5V5c-3-.5-6 0-8 1.5Z"/>
    <path d="M12 6.5v13"/>
  </symbol>
  <symbol id="i-reading" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 5.5a14 14 0 0 1 8 1.6 14 14 0 0 1 8-1.6v12.2a14 14 0 0 0-8 1.5 14 14 0 0 0-8-1.5Z"/>
    <path d="M12 7.1v12.2"/>
    <path d="M7 9.2c1.2 0 2.2.2 3 .6M7 12c1.2 0 2.2.2 3 .6"/>
  </symbol>
  <!-- ── interface + narrative marks (visual uplevel P1/P2) ─────────────── -->
  <symbol id="i-ask" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8.2"/>
    <path d="M9.6 9.6a2.4 2.4 0 1 1 3.3 2.2c-.75.33-.9.9-.9 1.6"/>
    <path d="M12 16.4h.01"/>
  </symbol>
  <symbol id="i-milestone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6.5 21V3.5"/>
    <path d="M6.5 4.5h9.5l-2.6 3.2 2.6 3.2H6.5"/>
  </symbol>
  <symbol id="i-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8.5 6.2v11.6l9.2-5.8Z"/>
  </symbol>
  <symbol id="i-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 6.5v11M15 6.5v11"/>
  </symbol>
  <symbol id="i-podcast" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="9.5" y="3.5" width="5" height="10" rx="2.5"/>
    <path d="M6 11a6 6 0 0 0 12 0"/>
    <path d="M12 17v3.5"/>
  </symbol>
  <symbol id="i-chronicle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M17.2 3.8l3 3L8.7 18.3 4.5 19.5l1.2-4.2L17.2 3.8Z"/>
    <path d="M14.8 6.2l3 3"/>
  </symbol>
  <!-- the character sheet: a figure held in the pillar ring (echo of the hero mark) -->
  <symbol id="i-character" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9.25" stroke-dasharray="4.6 1.6"/>
    <circle cx="12" cy="9" r="2.4"/>
    <path d="M7.8 17.5a4.2 4.2 0 0 1 8.4 0"/>
  </symbol>
</svg>
