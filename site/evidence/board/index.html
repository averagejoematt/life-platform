inputs become scores \u2014 N=1, the correlation engine, confidence.", "group": "Credibility & the machine", "mode": "editorial", "endpoint": null, "root": null, "legacy": "/legacy/methodology/", "editorial": "<p class=\"rd-lede\">How raw inputs become scores \u2014 and why an experiment of one is built the way it is.</p><section class=\"rd-sec\"><h2 class=\"rd-h\">Why N=1</h2><p class=\"rd-prose\">Population studies find the average effect across a group \u2014 real signal, but a statistical composite that may not resemble any individual. The N=1 approach turns that limitation into a feature: one subject means every measurement is directly relevant, with no between-person noise. The trade-off is external validity \u2014 you cannot generalise these results to you, and that is fine. <strong>The value is the framework, not the conclusions.</strong></p></section><section class=\"rd-sec\"><h2 class=\"rd-h\">The correlation engine</h2><p class=\"rd-prose\">The core analytical layer is a rolling correlation engine that continuously computes Pearson <em>r</em> across metric pairs (sleep, recovery, nutrition, training, glucose). Running ~23 pairs at once creates a multiple-comparisons problem \u2014 the more tests you run, the more likely one is a false positive. So a Benjamini-Hochberg FDR correction controls the false-discovery rate across all simultaneous comparisons, and a minimum sample size is required before any correlation is surfaced.</p><p class=\"rd-prose\">A finding is only reported with its <em>p</em>-value alongside <em>r</em>, and an FDR-adjusted <em>q</em>-value used for filtering. Example: a confirmed pattern at p=0.003, n=47 paired days, BH-FDR q=0.014 \u2014 survives correction.</p></section><section class=\"rd-sec\"><h2 class=\"rd-h\">Confidence vocabulary</h2><p class=\"rd-prose\">Everything is correlative, never causal. Fewer than 12 observations is a <strong>preliminary pattern</strong>; fewer than 30 is <strong>low confidence</strong>. The character model rolls these into a Level (1\u2013100) across five tiers \u2014 Foundation \u2192 Momentum \u2192 Discipline \u2192 Mastery \u2192 Elite \u2014 over seven pillars: Sleep, Movement, Nutrition, Metabolic, Mind, Relationships, and Consistency.</p></section><p class=\"correlative\">The model never computes in prose \u2014 it interprets pre-computed numbers only. <span class=\"confidence conf-low\">N=1</span></p>"}, {"slug": "intelligence", "title": "Intelligence", "blurb": "Cross-source correlations the engine surfaces (correlative only).", "group": "Credibility & the machine", "mode": "data", "endpoint": "/api/correlations", "root": null, "legacy": "/legacy/intelligence/"}, {"slug": "predictions", "title": "Predictions", "blurb": "The model's forward calls \u2014 logged, then scored against reality.", "group": "Credibility & the machine", "mode": "data", "endpoint": "/api/predictions", "root": null, "legacy": "/legacy/predictions/"}, {"slug": "benchmarks", "title": "Benchmarks", "blurb": "Where the numbers sit vs age-band and centenarian targets.", "group": "Credibility & the machine", "mode": "data", "endpoint": "/api/benchmark_trends", "root": null, "legacy": "/legacy/benchmarks/"}, {"slug": "biology", "title": "Biology & genome", "blurb": "Genome risk by category \u2014 the baseline biology behind the numbers.", "group": "Credibility & the machine", "mode": "data", "endpoint": "/api/genome_risks", "root": null, "legacy": "/legacy/biology/"}, {"slug": "platform", "title": "The platform", "blurb": "The architecture by the numbers \u2014 sources, tools, lambdas, tests.", "group": "Credibility & the machine", "mode": "data", "endpoint": "/api/platform_stats", "root": null, "legacy": "/legacy/platform/"}, {"slug": "data", "title": "Data sources", "blurb": "Every source feeding the platform, what it measures, how often.", "group": "Credibility & the machine", "mode": "data", "endpoint": "/data/data_sources.json", "root": null, "legacy": "/legacy/data/"}, {"slug": "to
