[mypy]
# Advisory mypy — non-blocking. Configured to be useful without being noisy.
# Source-of-truth for what passes today: tests/test_mypy_clean_modules.py
python_version = 3.12
warn_unused_ignores = True
warn_return_any = False
warn_unused_configs = True
no_implicit_optional = True
check_untyped_defs = False
# Modules outside the typed surface have many `Any` returns; squelch noise.
disable_error_code = no-redef, var-annotated, assignment, attr-defined, index, arg-type, return-value, name-defined, return, operator, type-arg, union-attr, list-item, has-type

# Skip noisy bundled-with-Lambda modules and tests for now.
exclude = (?x)(
    ^cdk/
    | ^tests/
    | ^deploy/
    | ^\.venv/
  )

# Third-party stubs we don't need to resolve.
[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

# Pillow ships no bundled type stubs and we don't install types-Pillow;
# og_image_lambda.py/og_moments.py (#419 tier-2 web/ set) use PIL for
# card rendering. Known false positive, not a real type gap.
[mypy-PIL.*]
ignore_missing_imports = True

# Suppress missing imports for sibling lambdas/ modules that aren't typed yet.
[mypy-ai_output_validator]
ignore_missing_imports = True

[mypy-board_loader]
ignore_missing_imports = True

[mypy-platform_logger]
ignore_missing_imports = True

# grounding_guard lives in lambdas/intelligence/ (flat-copied into the layer by
# build_layer.sh) — unresolvable from the repo root either way. ADR-104.
[mypy-grounding_guard]
ignore_missing_imports = True

[mypy-intelligence.grounding_guard]
ignore_missing_imports = True
