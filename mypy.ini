[mypy]
# Enforced (BLOCKING in CI) on the clean-module set — tests/test_mypy_clean_modules.py
# + the ci-cd.yml "Mypy gate (ENFORCED — clean-module set, ADR-080)" step; advisory
# elsewhere. Configured to be useful without being noisy.
python_version = 3.12
warn_unused_ignores = True
warn_return_any = False
warn_unused_configs = True
no_implicit_optional = True
check_untyped_defs = False
# Disable list — being emptied incrementally (#1656, part of eng-excellence #1648).
# Enforced clean on the clean-module set + its full import closure. Codes now ENABLED
# (was 14, now 7): no-redef, var-annotated, name-defined, type-arg, union-attr,
# list-item, has-type — the clean-set closure passes each of these. `var-annotated`
# was cleared by annotating 18 empty-container declarations (element types only, no
# runtime change).
#
# Still disabled (each a documented next-ratchet step, not silently kept):
#   assignment(~66) attr-defined index arg-type return-value(~25) return operator —
# these are structural mismatches (dict value-type invariance, `object`-typed values
# from untyped JSON sources) whose honest fixes are signature corrections that ripple
# to callers, not scoped annotations, so they exceed a type-config pass.
# `check_untyped_defs`/`warn_return_any` also stay False: enabling them surfaces
# latent-Optional returns (e.g. ai_calls.call_*_coach_v2 declared `-> str` but can
# return None) and untyped-body issues across transitively-imported first-party
# modules that require behavior-touching fixes — out of scope here (see #1656).
disable_error_code = assignment, attr-defined, index, arg-type, return-value, return, operator

# Skip noisy bundled-with-Lambda modules and tests for now.
exclude = (?x)(
    ^cdk/
    | ^tests/
    | ^deploy/
    | ^\.venv/
  )

# Third-party stubs we don't need to resolve.
[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

# Pillow ships no bundled type stubs and we don't install types-Pillow;
# og_image_lambda.py/og_moments.py (#419 tier-2 web/ set) use PIL for
# card rendering. Known false positive, not a real type gap.
[mypy-PIL.*]
ignore_missing_imports = True

# Suppress missing imports for sibling lambdas/ modules that aren't typed yet.
[mypy-ai_output_validator]
ignore_missing_imports = True

[mypy-board_loader]
ignore_missing_imports = True

[mypy-platform_logger]
ignore_missing_imports = True
# DIRTY-set (#1656): Logger subclass narrows msg: object -> str on every level
# method (LSP-violating override x6); widely imported, a shared-layer change.
# ignore_errors keeps its types available to importers while suppressing only
# its own tracked errors — see tests/mypy_clean_set.py::DIRTY.
ignore_errors = True

# grounding_guard lives in lambdas/intelligence/ (flat-copied into the layer by
# build_layer.sh) — unresolvable from the repo root either way. ADR-104.
[mypy-grounding_guard]
ignore_missing_imports = True

[mypy-intelligence.grounding_guard]
ignore_missing_imports = True

# ── DIRTY-set import suppression (#1656) ──────────────────────────────────────
# These first-party modules are on the clean-set denylist (tests/mypy_clean_set.py
# ::DIRTY) but are imported BY clean modules, so mypy would otherwise report their
# own (tracked, out-of-scope) errors while checking the clean surface. ignore_errors
# keeps their symbol types available to importers while suppressing only their own
# errors — the honest "excluded, tracked separately" mechanism. Each shrinks off
# this list when its module is fixed and moved into the clean set. (platform_logger
# gets ignore_errors in its own section above.)
#
# training_notes: residual misc + var-annotated; imported by training_notes_llm.
[mypy-training_notes]
ignore_errors = True

# The 3,000-line endpoint handlers, imported by web/site_api_lambda.py — explicitly
# out of scope (var-annotated + misc + call-overload); the next ratchet step.
[mypy-web.site_api_data]
ignore_errors = True

[mypy-web.site_api_observatory]
ignore_errors = True
