<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Matt's Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #161921;
  --border: #232733;
  --text: #e8e6e3;
  --muted: #8a8997;
  --dim: #555566;
  --green: #4ade80;
  --green-bg: rgba(74,222,128,.08);
  --green-glow: rgba(74,222,128,.15);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,.08);
  --yellow-glow: rgba(251,191,36,.15);
  --red: #f87171;
  --red-bg: rgba(248,113,113,.08);
  --red-glow: rgba(248,113,113,.15);
  --font: 'Outfit', -apple-system, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 440px; margin: 0 auto; padding: 0 20px env(safe-area-inset-bottom) }

/* ── Header ── */
.hdr {
  padding: 20px 0 8px;
  text-align: center;
}
.hdr-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.hdr-sub {
  font-size: 11px;
  color: var(--dim);
  margin-top: 4px;
}

/* ── Beacon ── */
.beacon {
  margin: 20px 0;
  padding: 28px 24px;
  border-radius: 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.beacon::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  border: 1px solid transparent;
}
.beacon.green {
  background: var(--green-bg);
}
.beacon.green::before { border-color: rgba(74,222,128,.2) }
.beacon.yellow {
  background: var(--yellow-bg);
}
.beacon.yellow::before { border-color: rgba(251,191,36,.2) }
.beacon.red {
  background: var(--red-bg);
}
.beacon.red::before { border-color: rgba(248,113,113,.2) }

.beacon-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  margin: 0 auto 14px;
}
.beacon.green .beacon-dot { background: var(--green); box-shadow: 0 0 20px var(--green-glow), 0 0 40px var(--green-glow) }
.beacon.yellow .beacon-dot { background: var(--yellow); box-shadow: 0 0 20px var(--yellow-glow), 0 0 40px var(--yellow-glow) }
.beacon.red .beacon-dot { background: var(--red); box-shadow: 0 0 20px var(--red-glow), 0 0 40px var(--red-glow) }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1) }
  50% { opacity: .7; transform: scale(1.15) }
}
.beacon.red .beacon-dot { animation: pulse 2s ease-in-out infinite }

.beacon-label {
  font-size: 20px;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 6px;
}
.beacon.green .beacon-label { color: var(--green) }
.beacon.yellow .beacon-label { color: var(--yellow) }
.beacon.red .beacon-label { color: var(--red) }

.beacon-sub {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
  max-width: 300px;
  margin: 0 auto;
}

/* ── Status Lines ── */
.status-section {
  margin: 0 0 16px;
}
.section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.status-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.status-row {
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.status-row + .status-row {
  border-top: 1px solid var(--border);
}
.status-icon {
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-top: 6px;
  flex-shrink: 0;
}
.status-icon.green { background: var(--green) }
.status-icon.yellow { background: var(--yellow) }
.status-icon.red { background: var(--red) }
.status-content { flex: 1 }
.status-area {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 2px;
}
.status-text {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.4;
}

/* ── Activity / Food Highlights ── */
.highlights {
  margin: 0 0 16px;
}
.highlight-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}
.highlight-card + .highlight-card {
  margin-top: 10px;
}
.hl-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 4px;
}
.hl-row + .hl-row { margin-top: 8px }
.hl-name {
  font-size: 14px;
  font-weight: 500;
}
.hl-date {
  font-size: 11px;
  color: var(--dim);
}
.hl-detail {
  font-size: 12px;
  color: var(--muted);
}
.hl-text {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}

/* ── Journey Bar ── */
.journey {
  margin: 0 0 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}
.journey-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.journey-stat {
  font-size: 22px;
  font-weight: 700;
  color: var(--green);
}
.journey-stat .unit {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
}
.journey-days {
  font-size: 12px;
  color: var(--dim);
}
.progress-track {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 6px;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--green), #22d3ee);
  transition: width .6s ease;
}
.journey-label {
  font-size: 11px;
  color: var(--dim);
  text-align: center;
}

/* ── Tom's Prompt ── */
.prompt {
  margin: 0 0 20px;
  padding: 18px 20px;
  border-radius: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
}
.prompt-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.prompt-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
  font-weight: 400;
}

/* ── Footer ── */
.ftr {
  padding: 12px 0 32px;
  text-align: center;
}
.ftr-updated {
  font-size: 11px;
  color: var(--dim);
}

/* ── Loading / Error ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  flex-direction: column;
  gap: 12px;
}
.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg) } }
.loading-text { font-size: 12px; color: var(--dim) }
.error { font-size: 13px; color: var(--red); text-align: center; padding: 40px 20px }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px) }
  to { opacity: 1; transform: translateY(0) }
}
.ani { animation: fadeUp .5s ease both }
.d1 { animation-delay: .05s }
.d2 { animation-delay: .1s }
.d3 { animation-delay: .15s }
.d4 { animation-delay: .2s }
.d5 { animation-delay: .25s }
.d6 { animation-delay: .3s }
.d7 { animation-delay: .35s }
.d8 { animation-delay: .4s }

/* ── Character Sheet ── */
.cs-card {
  margin: 0 0 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.cs-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.cs-card.t-foundation::before { background: #6b7280 }
.cs-card.t-momentum::before  { background: var(--yellow) }
.cs-card.t-discipline::before { background: #60a5fa }
.cs-card.t-mastery::before   { background: var(--green) }
.cs-card.t-elite::before     { background: #a78bfa }

.cs-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.cs-level {
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.cs-card.t-foundation .cs-level { color: #9ca3af }
.cs-card.t-momentum .cs-level  { color: var(--yellow) }
.cs-card.t-discipline .cs-level { color: #60a5fa }
.cs-card.t-mastery .cs-level   { color: var(--green) }
.cs-card.t-elite .cs-level     { color: #a78bfa }

.cs-meta { flex: 1 }
.cs-tier {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 2px;
}
.cs-xp {
  font-size: 11px;
  color: var(--dim);
}

/* Pillar bars */
.cs-pillars { display: flex; flex-direction: column; gap: 8px }
.cs-pillar {
  display: flex;
  align-items: center;
  gap: 8px;
}
.cs-p-icon {
  width: 18px;
  text-align: center;
  font-size: 12px;
  flex-shrink: 0;
}
.cs-p-name {
  width: 52px;
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
}
.cs-p-track {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.cs-p-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .6s ease;
}
.cs-p-fill.f-foundation { background: #6b7280 }
.cs-p-fill.f-momentum   { background: var(--yellow) }
.cs-p-fill.f-discipline  { background: #60a5fa }
.cs-p-fill.f-mastery    { background: var(--green) }
.cs-p-fill.f-elite      { background: #a78bfa }

.cs-p-lv {
  width: 26px;
  font-size: 11px;
  font-weight: 600;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* Events */
.cs-events {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.cs-ev {
  font-size: 12px;
  color: var(--muted);
}
.cs-ev .arrow-up { color: var(--green) }
.cs-ev .arrow-dn { color: var(--yellow) }

/* Effects pills */
.cs-effects {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.cs-eff {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 10px;
  background: rgba(255,255,255,.05);
  color: var(--muted);
}
.bav-wrap { display:flex; justify-content:center; margin:4px 0 12px; position:relative }
.bav-box { position:relative; width:96px; height:96px }
.bav-aura { position:absolute; inset:0; border-radius:50%; opacity:.12; filter:blur(10px) }
.bav-char { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); image-rendering:pixelated }
.bav-label { text-align:center; font-size:8px; color:var(--dim); letter-spacing:.5px; margin-top:2px; text-transform:uppercase }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>
</div>

<script>
const DATA_URL = 'matthew/data.json';

async function init() {
  const app = document.getElementById('app');
  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('Failed to load');
    const d = await resp.json();
    app.innerHTML = render(d);
  } catch (e) {
    app.innerHTML = '<div class="error">Unable to load data. Try refreshing.</div>';
  }
}

function render(d) {
  const b = d.beacon || 'green';
  const statusRows = (d.status_lines || []).map(s =>
    `<div class="status-row">
      <div class="status-icon ${s.status}"></div>
      <div class="status-content">
        <div class="status-area">${esc(s.area)}</div>
        <div class="status-text">${esc(s.text)}</div>
      </div>
    </div>`
  ).join('');

  const activityItems = (d.activity_highlights || []).map(a =>
    `<div class="hl-row">
      <div>
        <div class="hl-name">${esc(a.name)}</div>
        <div class="hl-detail">${esc(a.detail)}</div>
      </div>
      <div class="hl-date">${esc(a.date)}</div>
    </div>`
  ).join('');

  const j = d.journey || {};
  const pct = Math.min(j.pct_complete || 0, 100);

  return `
    <div class="hdr ani d1">
      <div class="hdr-name">Matt's Check-In</div>
      <div class="hdr-sub">Thank you for looking out for me! &middot; Updated ${esc(d.last_updated_friendly || 'recently')}</div>
    </div>

    <div class="beacon ${b} ani d2">
      <div class="beacon-dot"></div>
      <div class="beacon-label">${esc(d.beacon_label || "Checking in")}</div>
      <div class="beacon-sub">${esc(d.beacon_summary || "")}</div>
    </div>

    <div class="status-section ani d3">
      <div class="section-title">The Essentials</div>
      <div class="status-card">${statusRows}</div>
    </div>

    ${activityItems ? `
    <div class="highlights ani d4">
      <div class="section-title">What He's Been Up To</div>
      <div class="highlight-card">${activityItems}</div>
    </div>` : ''}

    ${d.food_snapshot ? `
    <div class="highlights ani d5">
      <div class="section-title">On the Food Front</div>
      <div class="highlight-card">
        <div class="hl-text">${esc(d.food_snapshot)}</div>
      </div>
    </div>` : ''}

    <div class="journey ani d6">
      <div class="section-title" style="margin-bottom:10px">The Journey</div>
      <div class="journey-top">
        <div class="journey-stat">${j.lost_lbs || 0}<span class="unit"> lbs down</span></div>
        <div class="journey-days">Day ${j.days || 0}</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="journey-label">${pct}% of the way to ${j.goal_lbs || 185} lbs</div>
    </div>

    ${renderCharSheet(d)}

    <div class="prompt ani d8">
      <div class="prompt-label">What Matt could use right now</div>
      <div class="prompt-text">${esc(d.prompt_for_tom || "Just be a mate.")}</div>
    </div>

    <div class="ftr">
      <div class="ftr-updated">Last updated: ${esc(d.last_updated_friendly || 'Unknown')}</div>
    </div>
  `;
}

function renderBuddyAvatar(av) {
  if (!av) return '';
  var tier = av.tier || 'foundation', bf = av.body_frame || 1;
  var auraCols = {foundation:'#6b7280',momentum:'#fbbf24',discipline:'#60a5fa',mastery:'#34d399',elite:'#a78bfa'};
  var ac = auraCols[tier] || '#6b7280';
  var tierNames = {foundation:'Foundation',momentum:'Momentum',discipline:'Discipline',mastery:'Mastery',elite:'Elite'};
  // PNG sprite served from dashboard S3 bucket
  var spriteUrl = 'https://dash.averagejoematt.com/avatar/base/' + tier + '-frame' + bf + '.png';
  return '<div class="bav-wrap"><div class="bav-box">' +
    '<div class="bav-aura" style="background:'+ac+'"></div>' +
    '<div class="bav-char"><img src="' + spriteUrl + '" width="96" height="96" style="image-rendering:pixelated;image-rendering:crisp-edges" alt="Avatar"/></div>' +
    '</div><div class="bav-label">' + (tierNames[tier] || tier) + '</div></div>';
}

function renderCharSheet(d) {
  var cs = d.character_sheet;
  if (!cs) return '';

  var tier = (cs.tier || 'Foundation').toLowerCase();
  var tClass = 't-' + tier;
  var emoji = cs.tier_emoji || '🔨';
  var lv = cs.level || 1;
  var xp = (cs.xp || 0).toLocaleString();

  var pillarDefs = [
    { key: 'sleep',         icon: '😴', name: 'Sleep' },
    { key: 'movement',      icon: '🏋️', name: 'Move' },
    { key: 'nutrition',     icon: '🥗', name: 'Nutri' },
    { key: 'metabolic',     icon: '📊', name: 'Meta' },
    { key: 'mind',          icon: '🧠', name: 'Mind' },
    { key: 'relationships', icon: '💬', name: 'Relate' },
    { key: 'consistency',   icon: '🎯', name: 'Consist' }
  ];

  var pillars = cs.pillars || {};
  var pillarRows = pillarDefs.map(function(pd) {
    var p = pillars[pd.key] || {};
    var plv = p.level || 1;
    var ptier = (p.tier || 'Foundation').toLowerCase();
    var w = Math.max(2, plv);
    return '<div class="cs-pillar">' +
      '<div class="cs-p-icon">' + pd.icon + '</div>' +
      '<div class="cs-p-name">' + pd.name + '</div>' +
      '<div class="cs-p-track"><div class="cs-p-fill f-' + ptier + '" style="width:' + w + '%"></div></div>' +
      '<div class="cs-p-lv">' + plv + '</div>' +
    '</div>';
  }).join('');

  var evts = (cs.events || []).slice(0, 3);
  var evtHtml = '';
  if (evts.length) {
    var evtRows = evts.map(function(e) {
      var isUp = e.type && (e.type.indexOf('up') !== -1);
      var arrow = isUp ? '<span class="arrow-up">▲</span>' : '<span class="arrow-dn">▼</span>';
      var pillar = e.pillar ? e.pillar.charAt(0).toUpperCase() + e.pillar.slice(1) : '';
      var label = '';
      if (e.type === 'tier_up' || e.type === 'tier_down') {
        label = pillar + ' → ' + (e.new_tier || '');
      } else {
        label = pillar + ' Lv ' + (e.old_level || '') + ' → ' + (e.new_level || '');
      }
      return '<div class="cs-ev">' + arrow + ' ' + esc(label) + '</div>';
    }).join('');
    evtHtml = '<div class="cs-events">' + evtRows + '</div>';
  }

  var effects = cs.effects || [];
  var effHtml = '';
  if (effects.length) {
    var effPills = effects.map(function(ef) {
      var name = typeof ef === 'string' ? ef : (ef.emoji || '') + ' ' + (ef.name || '');
      return '<span class="cs-eff">' + esc(name) + '</span>';
    }).join('');
    effHtml = '<div class="cs-effects">' + effPills + '</div>';
  }

  var avatarHtml = renderBuddyAvatar(d.avatar);

  return '<div class="ani d7">' +
    '<div class="section-title">Character Sheet</div>' +
    '<div class="cs-card ' + tClass + '">' +
      '<div class="cs-header">' +
        '<div class="cs-level">' + lv + '</div>' +
        '<div class="cs-meta">' +
          '<div class="cs-tier">' + emoji + ' ' + esc(cs.tier || 'Foundation') + '</div>' +
          '<div class="cs-xp">' + xp + ' XP</div>' +
        '</div>' +
      '</div>' +
      avatarHtml +
      '<div class="cs-pillars">' + pillarRows + '</div>' +
      evtHtml +
      effHtml +
    '</div>' +
  '</div>';
}

function esc(s) {
  if (!s) return '';
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

init();
// Auto-refresh every 30 minutes
setInterval(init, 30 * 60 * 1000);
</script>
</body>
</html>
