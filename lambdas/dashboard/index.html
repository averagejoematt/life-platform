<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Life Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0f;--surface:#16161a;--border:#2a2a32;--text:#e8e6e3;--muted:#72717a;--dim:#4a4950;--green:#34d399;--green-d:rgba(52,211,153,.12);--yellow:#fbbf24;--yellow-d:rgba(251,191,36,.12);--red:#f87171;--red-d:rgba(248,113,113,.12);--blue:#60a5fa;--radius:14px;--font:'DM Sans',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;-webkit-font-smoothing:antialiased}
.c{max-width:420px;margin:0 auto;padding:0 16px env(safe-area-inset-bottom)}

.nav{display:flex;gap:16px;padding:10px 0 0;border-bottom:none}
.nav a{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--dim);text-decoration:none;padding:3px 0;border-bottom:2px solid transparent;transition:all .15s}
.nav a:hover{color:var(--text)}
.nav a.active{color:var(--green);border-bottom-color:var(--green)}
.hdr{padding:12px 0 12px;display:flex;justify-content:space-between;align-items:baseline}
.hdr-date{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.hdr-sub{font-size:10px;color:var(--dim);letter-spacing:.5px}
.hdr-time{font-family:var(--mono);font-size:10px;color:var(--dim)}

.hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:10px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}
.hero.g::before{background:var(--green)}.hero.y::before{background:var(--yellow)}.hero.r::before{background:var(--red)}.hero.x::before{background:var(--dim)}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start}
.signal{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:6px}
.hero.g .signal{background:var(--green-d);color:var(--green)}.hero.y .signal{background:var(--yellow-d);color:var(--yellow)}.hero.r .signal{background:var(--red-d);color:var(--red)}.hero.x .signal{background:rgba(74,73,80,.2);color:var(--dim)}
.hero-score{font-family:var(--mono);font-size:52px;font-weight:700;line-height:1;letter-spacing:-2px}
.hero.g .hero-score{color:var(--green)}.hero.y .hero-score{color:var(--yellow)}.hero.r .hero-score{color:var(--red)}.hero.x .hero-score{color:var(--dim)}
.hero-rec{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.4}
.hero-rec strong{color:var(--text);font-weight:600}
.hrv-row{display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.hrv-s{display:flex;flex-direction:column}
.hrv-l{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.hrv-v{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text)}
.hrv-u{font-size:10px;color:var(--muted);font-weight:500}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;min-height:120px}
.t-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:8px}
.t-val{font-family:var(--mono);font-size:32px;font-weight:700;line-height:1;letter-spacing:-1px}
.t-unit{font-size:12px;font-weight:500;color:var(--muted);margin-left:2px;letter-spacing:0}
.t-det{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.3}
.t-spark{margin-top:auto;padding-top:8px;height:32px}
.t-spark svg{width:100%;height:100%}

.up{color:var(--green)}.dn{color:var(--red)}.st{color:var(--dim)}.pdn{color:var(--green)}

.gc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:10px}
.gc-top{display:flex;align-items:baseline;gap:12px;margin-bottom:6px}
.gc-letter{font-family:var(--mono);font-size:36px;font-weight:700;line-height:1}
.gc-score{font-family:var(--mono);font-size:14px;color:var(--muted)}
.gc-tldr{font-size:12px;color:var(--muted);line-height:1.5;font-style:italic;margin-bottom:12px}
.bars{display:flex;gap:4px;align-items:flex-end;height:40px}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;height:100%}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;margin-top:auto}
.bl{font-size:7px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px;margin-top:4px;text-align:center;white-space:nowrap}

.cs{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:10px;position:relative;overflow:hidden}
.cs::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}
.cs.cs-foundation::before{background:#6b7280}.cs.cs-momentum::before{background:var(--yellow)}.cs.cs-discipline::before{background:var(--blue)}.cs.cs-mastery::before{background:var(--green)}.cs.cs-elite::before{background:#a78bfa}
.cs-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.cs-lv{font-family:var(--mono);font-size:42px;font-weight:700;line-height:1;letter-spacing:-2px}
.cs-tier{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:6px;display:inline-block;margin-top:4px}
.cs-xp{font-family:var(--mono);font-size:10px;color:var(--dim);text-align:right}
.cs-radar{display:flex;justify-content:center;margin:0 -8px}
.cs-events{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.cs-ev{font-size:11px;font-weight:600;padding:6px 10px;border-radius:8px;border:1px solid}
.cs-effects{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.cs-eff{font-size:10px;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:3px 10px}
.av-wrap{display:flex;justify-content:center;margin:12px 0 8px;position:relative}
.av-box{position:relative;width:160px;height:160px}
.av-aura{position:absolute;inset:0;border-radius:50%;opacity:.15;filter:blur(16px)}
.av-char{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);image-rendering:pixelated}
.av-badge{position:absolute;width:18px;height:18px;border-radius:50%;border:1.5px solid transparent;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .3s}
.av-badge.hidden{opacity:0}.av-badge.dim{opacity:.4;border-color:rgba(255,255,255,.15)}.av-badge.bright{opacity:1;border-color:rgba(255,255,255,.3);box-shadow:0 0 6px rgba(255,255,255,.2)}
.av-ground{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:60px;height:4px;border-radius:50%;filter:blur(3px)}
.av-frame-label{text-align:center;font-size:9px;color:var(--dim);letter-spacing:.5px;margin-top:4px;text-transform:uppercase}
.ftr{padding:16px 0 24px;text-align:center}
.ftr-t{font-size:9px;color:var(--dim);letter-spacing:.5px}
.nav-pill{font-size:10px;font-weight:600;color:var(--muted);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:6px;transition:all .15s;letter-spacing:.3px}
.nav-pill:hover{color:var(--green);border-color:var(--green)}

.ld{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px}
.sp{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-t{font-size:11px;color:var(--dim);letter-spacing:.5px}
.err{font-size:12px;color:var(--red);text-align:center;padding:40px 20px}

@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.an{animation:fu .4s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}.d7{animation-delay:.35s}
</style>
</head>
<body>
<div class="c" id="app">
  <div class="ld" id="loading">
    <div class="sp"></div>
    <div class="ld-t">Loading health data&hellip;</div>
  </div>
</div>
<script>
(function(){
'use strict';
var U='matthew/data.json',R=30*60*1000;
function $(i){return document.getElementById(i)}
function cs(s){return s==null?'var(--dim)':s>=80?'var(--green)':s>=60?'var(--blue)':s>=40?'var(--yellow)':'var(--red)'}
function gc(l){return!l?'var(--dim)':l[0]==='A'?'var(--green)':l[0]==='B'?'var(--blue)':l[0]==='C'?'var(--yellow)':'var(--red)'}
function ta(d,inv){if(d==null)return'';var c=inv?(d<0?'pdn':d>0?'dn':'st'):(d>0?'up':d<0?'dn':'st');var a=d>0?'&#9650;':d<0?'&#9660;':'&#8212;';return'<span class="'+c+'">'+a+'</span>'}
function sl(pts,col){if(!pts||pts.length<2)return'';var v=pts.filter(function(x){return x!=null});if(v.length<2)return'';var mn=Math.min.apply(null,v),mx=Math.max.apply(null,v),rg=mx-mn||1,w=100,h=28,p=2,st=(w-p*2)/(v.length-1);var pp=v.map(function(val,i){var x=p+i*st,y=p+(1-(val-mn)/rg)*(h-p*2);return(i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1)});var lx=(p+(v.length-1)*st).toFixed(1),ly=(p+(1-(v[v.length-1]-mn)/rg)*(h-p*2)).toFixed(1);var id='s'+col.replace(/[^a-z0-9]/g,'');var fp=pp.join(' ')+' L'+lx+','+h+' L'+p+','+h+' Z';return'<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity="0.25"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs><path d="'+fp+'" fill="url(#'+id+')"/><path d="'+pp.join(' ')+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+lx+'" cy="'+ly+'" r="2.5" fill="'+col+'"/></svg>'}
function f(v,d){return v==null?'—':d?v.toFixed(d):Math.round(v).toString()}
function ft(iso){if(!iso)return'';try{var d=new Date(iso),h=d.getHours(),m=d.getMinutes(),a=h>=12?'PM':'AM';h=h%12||12;return h+':'+(m<10?'0':'')+m+' '+a}catch(e){return''}}
function fd(s){if(!s)return'';try{var p=s.split('-'),d=new Date(+p[0],+p[1]-1,+p[2]);return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+', '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getDate()}catch(e){return s}}

function tc(tier){var m={'Foundation':'#6b7280','Momentum':'var(--yellow)','Discipline':'var(--blue)','Mastery':'var(--green)','Elite':'#a78bfa'};return m[tier]||'var(--dim)'}
function tcClass(tier){return'cs-'+(tier||'foundation').toLowerCase()}
function radar(pillars,tierColor){
var labels=['Sleep','Move','Nutrition','Metabolic','Mind','Social','Habits'];
var keys=['sleep','movement','nutrition','metabolic','mind','relationships','consistency'];
var n=7,cx=150,cy=145,maxR=90,w=300,h=290;
var angles=[];for(var i=0;i<n;i++)angles.push(-Math.PI/2+2*Math.PI*i/n);
function px(a,r){return cx+Math.cos(a)*r}
function py(a,r){return cy+Math.sin(a)*r}
var svg='<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="max-width:260px">';
// Grid rings
for(var ring=1;ring<=5;ring++){var rr=maxR*ring/5;var pts=[];for(var i=0;i<n;i++)pts.push(px(angles[i],rr).toFixed(1)+','+py(angles[i],rr).toFixed(1));svg+='<polygon points="'+pts.join(' ')+'" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>';}
// Axis lines
for(var i=0;i<n;i++){svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+px(angles[i],maxR).toFixed(1)+'" y2="'+py(angles[i],maxR).toFixed(1)+'" stroke="rgba(255,255,255,.08)" stroke-width="1"/>';}
// Data polygon
var dp=[];for(var i=0;i<n;i++){var pd=pillars[keys[i]]||{};var lv=pd.level||1;var r2=Math.max(maxR*0.06,maxR*lv/100);dp.push(px(angles[i],r2).toFixed(1)+','+py(angles[i],r2).toFixed(1));}
svg+='<polygon points="'+dp.join(' ')+'" fill="'+tierColor+'" fill-opacity="0.15" stroke="'+tierColor+'" stroke-width="2" stroke-linejoin="round"/>';
// Data dots + labels
for(var i=0;i<n;i++){var pd=pillars[keys[i]]||{};var lv=pd.level||1;var r2=Math.max(maxR*0.06,maxR*lv/100);var dx=px(angles[i],r2),dy=py(angles[i],r2);svg+='<circle cx="'+dx.toFixed(1)+'" cy="'+dy.toFixed(1)+'" r="3" fill="'+tierColor+'"/>';
// Label
var lx=px(angles[i],maxR+22),ly=py(angles[i],maxR+22);var anchor='middle';if(Math.cos(angles[i])>0.3)anchor='start';else if(Math.cos(angles[i])<-0.3)anchor='end';
svg+='<text x="'+lx.toFixed(1)+'" y="'+(ly+3).toFixed(1)+'" text-anchor="'+anchor+'" fill="#72717a" font-size="9" font-family="DM Sans,sans-serif" font-weight="600" letter-spacing="0.5">'+labels[i]+'</text>';
svg+='<text x="'+lx.toFixed(1)+'" y="'+(ly+14).toFixed(1)+'" text-anchor="'+anchor+'" fill="'+tierColor+'" font-size="10" font-family="JetBrains Mono,monospace" font-weight="700">'+lv+'</text>';}
svg+='</svg>';return svg}

function renderAvatar(av,cCol){
if(!av)return'';
var tier=av.tier||'foundation',bf=av.body_frame||1,badges=av.badges||{},effects=av.effects||[],expr=av.expressions||{};
var auraCols={foundation:'#6b7280',momentum:'#fbbf24',discipline:'#60a5fa',mastery:'#34d399',elite:'#a78bfa'};
var ac=auraCols[tier]||'#6b7280';
// PNG sprite path (S3: dashboard/avatar/base/{tier}-frame{frame}.png)
var spriteUrl='https://dash.averagejoematt.com/avatar/base/'+tier+'-frame'+bf+'.png';
// Build HTML container
var h='<div class="av-wrap"><div class="av-box">';
h+='<div class="av-aura" style="background:'+ac+'"></div>';
// PNG sprite (48px native, rendered at 144px = 3x)
h+='<div class="av-char"><img src="'+spriteUrl+'" width="192" height="192" style="image-rendering:pixelated;image-rendering:crisp-edges" alt="Avatar"/></div>';
// Badge constellation
var bIcons={sleep:'\u{1F319}',movement:'\u26A1',nutrition:'\u{1F331}',metabolic:'\u2764\uFE0F',mind:'\u{1F48E}',relationships:'\u{1F91D}',consistency:'\u2B50'};
var bPos={sleep:[110,4],movement:[166,61],nutrition:[176,115],metabolic:[160,161],mind:[44,61],relationships:[32,115],consistency:[48,161]};
var bk=['sleep','movement','nutrition','metabolic','mind','relationships','consistency'];
for(var bi=0;bi<bk.length;bi++){var bn=bk[bi],bs=badges[bn]||'hidden',bp=bPos[bn];
h+='<div class="av-badge '+bs+'" style="left:'+bp[0]+'px;top:'+bp[1]+'px">'+bIcons[bn]+'</div>';}
h+='<div class="av-ground" style="background:'+ac+';opacity:'+(expr.ground==='solid'?'0.3':'0.1')+'"></div>';
h+='</div>';
if(av.alignment_ring){h+='<div class="av-frame-label" style="color:#ffd700">\u2728 Alignment Active</div>';}
var tierNames={foundation:'Foundation',momentum:'Momentum',discipline:'Discipline',mastery:'Mastery',elite:'Elite'};
h+='<div class="av-frame-label">'+(tierNames[tier]||tier)+' \u00B7 '+(av.composition_score!=null?Math.round(av.composition_score):0)+'% to goal</div>';
h+='</div>';return h}

function render(data){
var a=$('app'),r=data.readiness||{},s=data.sleep||{},h=data.hrv||{},w=data.weight||{},g=data.glucose||{},dg=data.day_grade||{},rc={'green':'g','yellow':'y','red':'r'}[r.color]||'x';
var o='';

// Nav
o+='<nav class="nav an"><a href="index.html" class="active">Dashboard</a><a href="clinical.html">Clinical</a></nav>';

// Header
o+='<div class="hdr an"><div><div class="hdr-date">'+fd(data.date)+'</div><div class="hdr-sub">Yesterday\'s Report</div></div><div style="text-align:right"><div class="hdr-time">'+ft(data.generated_at)+'</div></div></div>';

// Readiness hero
var rt=r.training_rec||'',rp=rt.split('·');
var rf=rp.length>1?'<strong>'+rp[0].trim()+'</strong> · '+rp.slice(1).join('·').trim():rt;
o+='<div class="hero '+rc+' an d1"><div class="hero-top"><div><div class="signal">'+(r.label||'—').toUpperCase()+'</div><div class="hero-score">'+f(r.score)+'</div></div><div style="text-align:right"><div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Readiness</div>';
if(rt)o+='<div class="hero-rec">'+rf+'</div>';
o+='</div></div>';

// HRV row
var hp=(h.avg_7d&&h.avg_30d)?Math.round((h.avg_7d/h.avg_30d-1)*100):null;
var ht=hp!=null?(hp>=0?'+':'')+hp+'%':'';
var hc=hp!=null?(hp>=2?'var(--green)':hp<=-2?'var(--red)':'var(--dim)'):'var(--dim)';
o+='<div class="hrv-row">';
o+='<div class="hrv-s"><span class="hrv-l">HRV</span><span class="hrv-v">'+f(h.value)+'<span class="hrv-u">ms</span></span></div>';
o+='<div class="hrv-s"><span class="hrv-l">7d avg</span><span class="hrv-v">'+f(h.avg_7d)+'<span class="hrv-u">ms</span></span></div>';
o+='<div class="hrv-s"><span class="hrv-l">30d avg</span><span class="hrv-v">'+f(h.avg_30d)+'<span class="hrv-u">ms</span></span></div>';
o+='<div class="hrv-s"><span class="hrv-l">vs 30d</span><span class="hrv-v" style="color:'+hc+'">'+ht+'</span></div>';
o+='</div></div>';

// Tile grid
o+='<div class="grid">';

// Sleep
var sc=cs(s.score);
o+='<div class="tile an d2"><div class="t-label">Sleep</div><div class="t-val" style="color:'+sc+'">'+f(s.score)+'</div>';
var sp=[];if(s.duration_hrs!=null)sp.push(s.duration_hrs.toFixed(1)+'h');if(s.efficiency!=null)sp.push(f(s.efficiency)+'% eff');
o+='<div class="t-det">'+sp.join(' · ')+'</div>';
var ap=[];if(s.deep_pct!=null)ap.push('D:'+f(s.deep_pct)+'%');if(s.rem_pct!=null)ap.push('R:'+f(s.rem_pct)+'%');
if(ap.length)o+='<div class="t-det">'+ap.join(' · ')+'</div>';
o+='<div class="t-spark">'+sl(s.sparkline,sc)+'</div></div>';

// Weight
var wd=w.weekly_delta,wc=wd!=null?(wd<0?'var(--green)':wd>0?'var(--red)':'var(--text)'):'var(--text)';
o+='<div class="tile an d3"><div class="t-label">Weight</div><div class="t-val" style="color:var(--text)">'+f(w.current,1)+'<span class="t-unit">lb</span></div>';
if(wd!=null){var ws=wd>0?'+':'';o+='<div class="t-det" style="color:'+wc+'">'+ta(wd,true)+' '+ws+wd.toFixed(1)+' lb/wk</div>'}
if(w.phase)o+='<div class="t-det">'+w.phase+' · '+f(w.journey_pct)+'% done</div>';
o+='<div class="t-spark">'+sl(w.sparkline,wc)+'</div></div>';

// Glucose
var glc=g.avg!=null?(g.avg<100?'var(--green)':g.avg<120?'var(--yellow)':'var(--red)'):'var(--dim)';
o+='<div class="tile an d4"><div class="t-label">Glucose</div><div class="t-val" style="color:'+glc+'">'+f(g.avg)+'<span class="t-unit">mg/dL</span></div>';
var gp=[];if(g.tir_pct!=null)gp.push('TIR '+f(g.tir_pct)+'%');if(g.variability!=null)gp.push('SD '+g.variability.toFixed(1));
o+='<div class="t-det">'+gp.join(' · ')+'</div>';
if(g.fasting_proxy!=null)o+='<div class="t-det">Fasting &asymp;'+f(g.fasting_proxy)+'</div>';
o+='<div class="t-spark">'+sl(g.sparkline,glc)+'</div></div>';

// Training / TSB
var tsb=data.tsb,tsbCol=tsb!=null?(tsb>10?'var(--yellow)':tsb<-20?'var(--red)':'var(--green)'):'var(--dim)';
var tl=tsb!=null?(tsb>10?'Detrained':tsb>0?'Fresh':tsb>-10?'Optimal':tsb>-20?'Loaded':'Overreached'):'—';
o+='<div class="tile an d5"><div class="t-label">Training</div><div class="t-val" style="color:'+tsbCol+'">'+(tsb!=null?(tsb>0?'+':'')+f(tsb):'—')+'<span class="t-unit">TSB</span></div>';
o+='<div class="t-det">'+tl+'</div>';
if(data.zone2_min!=null){var z2p=Math.min(100,Math.round(data.zone2_min/150*100)),z2c=z2p>=100?'var(--green)':z2p>=60?'var(--yellow)':'var(--red)';o+='<div class="t-det" style="color:'+z2c+'">'+f(data.zone2_min)+'/150 min Zone 2</div>'}
o+='</div>';

o+='</div>'; // grid

// Character Sheet
var csd=data.character_sheet;
if(csd&&csd.level!=null){
var cTier=csd.tier||'Foundation',cCol=tc(cTier),cCls=tcClass(cTier);
o+='<div class="cs '+cCls+' an d6">';
o+='<div class="cs-head"><div><div class="cs-lv" style="color:'+cCol+'">'+csd.level+'</div>';
o+='<div class="cs-tier" style="background:'+cCol+';color:#0c0c0f">'+(csd.tier_emoji||'')+' '+cTier+'</div>';
o+='</div><div style="text-align:right"><div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Character Level</div>';
o+='<div class="cs-xp">'+(csd.xp!=null?csd.xp.toLocaleString():0)+' XP</div></div></div>';
// Avatar (programmatic SVG placeholder — will be replaced with PNG sprites)
var avd=data.avatar;
if(!avd&&csd){
var cLv=csd.level||1,cTierLc=(csd.tier||'Foundation').toLowerCase();
var bf=1;
var tRanges={foundation:[1,20],momentum:[21,40],discipline:[41,60],mastery:[61,80],elite:[81,100]};
var tr=tRanges[cTierLc]||[1,20];
var prog=(cLv-tr[0])/(tr[1]-tr[0]);
bf=prog<0.33?1:prog<0.66?2:3;
avd={tier:cTierLc,body_frame:bf,badges:{},effects:[],expressions:{}};
}
if(avd){o+=renderAvatar(avd,cCol);}
// Radar
if(csd.pillars){o+='<div class="cs-radar">'+radar(csd.pillars,cCol)+'</div>';}
// Level events
var evts=csd.events||[];
if(evts.length){o+='<div class="cs-events">';for(var ei=0;ei<evts.length;ei++){var ev=evts[ei],et=ev.type||'',ep=(ev.pillar||'').replace(/_/g,' '),isUp=et.indexOf('up')>=0||et.indexOf('tier_up')>=0;var ec=isUp?'var(--green)':'var(--yellow)';var ea=isUp?'&#9650;':'&#9660;';
if(et.indexOf('tier')>=0){o+='<div class="cs-ev" style="color:'+ec+';border-color:'+ec+'">'+ea+' '+ep+': '+(ev.old_tier||'')+' &rarr; '+(ev.new_tier||'')+'</div>';}
else if(et.indexOf('character')>=0){o+='<div class="cs-ev" style="color:'+ec+';border-color:'+ec+'">'+ea+' Character Level '+(ev.old_level||'')+' &rarr; '+(ev.new_level||'')+'</div>';}
else{o+='<div class="cs-ev" style="color:'+ec+';border-color:'+ec+'">'+ea+' '+ep+' Lv'+(ev.old_level||'')+' &rarr; '+(ev.new_level||'')+'</div>';}}
o+='</div>';}
// Active effects
var efx=csd.effects||[];
if(efx.length){o+='<div class="cs-effects">';for(var fi=0;fi<efx.length;fi++){o+='<span class="cs-eff">'+(efx[fi].emoji||'')+' '+efx[fi].name+'</span>';}o+='</div>';}
o+='</div>';}

// Day grade card
o+='<div class="gc an d7"><div class="gc-top"><div class="gc-letter" style="color:'+gc(dg.letter)+'">'+(dg.letter||'—')+'</div><div class="gc-score">'+f(dg.score)+'/100</div></div>';
if(dg.tldr)o+='<div class="gc-tldr">&ldquo;'+dg.tldr+'&rdquo;</div>';
var cm=dg.components||{},co=['sleep','recovery','nutrition','movement','habits','hydration','journal','glucose'],cl=['SLP','RCV','NUT','MOV','HAB','HYD','JRN','GLU'];
o+='<div class="bars">';
for(var i=0;i<co.length;i++){var cv=cm[co[i]],ch=cv!=null?Math.max(4,Math.round(cv*.4)):2,cc=cs(cv);o+='<div class="bw"><div class="bar" style="height:'+ch+'px;background:'+cc+'"></div><div class="bl">'+cl[i]+'</div></div>'}
o+='</div></div>';

// Footer
o+='<div class="ftr"><div class="ftr-t">Life Platform · '+(data.sources_active||0)+' sources active</div></div>';

a.innerHTML=o;
}

function load(){
var x=new XMLHttpRequest();
x.open('GET',U+'?t='+Date.now(),true);
x.onreadystatechange=function(){
if(x.readyState!==4)return;
if(x.status===200){try{render(JSON.parse(x.responseText))}catch(e){$('app').innerHTML='<div class="err">Parse error: '+e.message+'</div>'}}
else if(x.status===0||x.status===404){$('app').innerHTML='<div class="err">No dashboard data yet. The Daily Brief generates it at 10:00 AM PT.</div>'}
else{$('app').innerHTML='<div class="err">Error loading data (HTTP '+x.status+')</div>'}
};
x.send();
}

load();
setInterval(load,R);
})();
</script>
</body>
</html>
