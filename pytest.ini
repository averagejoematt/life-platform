[pytest]
# V2 P4.13 (2026-05-17): register custom marks to silence PytestUnknownMarkWarning
# and enable `pytest -m 'not integration'` for fast unit-only cycles.
markers =
    integration: AWS-integration tests (network calls; ~24s); run separately in CI
    deploy_critical: deploy-gating structural/contract tests (#416, ADR-117). The fast
        offline subset that gates the `deploy` job — a failure means the deploy artifact
        or its wiring is broken, or a core honesty/safety contract the running system
        depends on is violated. Inclusion criteria live in docs/CONVENTIONS.md
        ("Deploy-critical test lane"). The exhaustive suite still runs on every push
        (job `test`) and still reds main; it just no longer skips deploy + the
        reader-facing visual-QA gate.

# Suppress noisy deprecation warnings from third-party libs (typeguard / logfire pull from python3.14 SDK)
filterwarnings =
    ignore::DeprecationWarning
