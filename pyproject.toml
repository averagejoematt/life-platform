# Formatting & linting config — A-grade "enforced style" tooling.
#
# Tools: ruff (lint + import-sort) + black (format). Line length 140 to match
# .flake8. ruff supersedes flake8 incrementally; flake8's E9/F-class stays the
# hard CI floor until the baseline lands.
#
# SEQUENCING: the repo-wide *baseline reformat* is intentionally deferred until
# the in-flight PRs merge — reformatting ~130 files now would conflict with
# every file those PRs touch. Until then this config is staged + advisory:
#   make format        # apply (the one-time baseline)
#   make format-check  # verify (wired to CI as a gate with the baseline PR)

[tool.black]
line-length = 140
target-version = ["py312"]
extend-exclude = '''/(\.venv|cdk\.out|layer-build|site|node_modules|archive|datadrops)/'''

[tool.ruff]
line-length = 140
target-version = "py312"
extend-exclude = [".venv", "cdk.out", "layer-build", "site", "node_modules", "archive", "datadrops", "_mcp_staging"]

[tool.ruff.lint]
# pycodestyle (E/W) + pyflakes (F) + isort (I).
select = ["E", "W", "F", "I"]
# E501 line-length (formatter) · E402 import-order (Lambda handlers) · E741
# ambiguous names · E701/E702 compound statements (intentional compact style;
# black keeps them) · E731 lambda-assign. F841 (unused-vars) is ENFORCED — cleaned
# across lambdas/tests/scripts/deploy after verifying every RHS was side-effect-free.
ignore = ["E501", "E402", "E741", "E701", "E702", "E731"]
# `# noqa: CDK_HANDLER_ORPHAN` belongs to the custom CDK handler-consistency
# linter (tests/test_cdk_handler_consistency.py), not ruff — don't warn on it.
external = ["CDK_HANDLER_ORPHAN"]

[tool.ruff.lint.per-file-ignores]
# mcp/ uses an import-driven tool-registration pattern — a blanket F401 removal
# orphans tools (proven by a reverted attempt). F401/F811/F841 deferred to a
# careful per-module pass.
"mcp/*.py" = ["F401", "F811", "F841"]
# cdk/stacks: `lambda_x = SomeLambda(...)` bindings are often unused but the call
# CREATES the resource — auto-removing F841 there would delete infrastructure.
"cdk/stacks/*.py" = ["F841"]

[tool.ruff.lint.isort]
combine-as-imports = true

# Import sorting is owned by ruff (tool.ruff.lint select "I" + tool.ruff.lint.isort)
# — standalone isort was removed: two sorters with different output fought each
# other and red-walled the CI format gate.
