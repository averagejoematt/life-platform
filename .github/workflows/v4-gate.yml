# v4 "The Measured Life" front-end gate.
# Deliberately separate from ci-cd.yml: this guards the static site (three doors
# + /legacy coverage) and has NO AWS access and NO deploy capability. It runs on
# PRs into main and on pushes to main, so the migration coverage can never
# regress below 0-unmapped before/at the cutover. Self-skips until the /legacy
# relocation exists, so it's a no-op for unrelated history.
name: v4 site gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/v4_*.py'
      - 'tests/pr_render_gate.py'
      - 'tests/visual_qa.py'
      - 'tests/accuracy_audit.py'
      - 'tests/fixtures/pr_gate/**'
      - '.github/workflows/v4-gate.yml'
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/v4_*.py'
      - 'tests/pr_render_gate.py'
      - 'tests/visual_qa.py'
      - 'tests/accuracy_audit.py'
      - 'tests/fixtures/pr_gate/**'

permissions:
  contents: read

jobs:
  site-gate:
    name: Migration coverage + HTML well-formedness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Migration coverage gate (0 unmapped)
        run: |
          if [ -d site/legacy ]; then
            echo "::group::v4 migration inventory"
            python3 scripts/v4_migration_inventory.py
            echo "::endgroup::"
          else
            echo "site/legacy/ not present — v4 migration gate skipped (pre-relocation)."
          fi

      - name: HTML well-formedness (all of site/)
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          import glob, sys
          bad = 0
          for f in glob.glob("site/**/*.html", recursive=True):
              try:
                  HTMLParser(convert_charrefs=True).feed(open(f, encoding="utf-8").read())
              except Exception as e:
                  print(f"  PARSE FAIL {f}: {e}"); bad += 1
          print(f"checked HTML files; {bad} parse error(s)")
          sys.exit(1 if bad else 0)
          PY

      - name: Core v4 doors present
        run: |
          for f in site/index.html site/now/index.html site/data/index.html site/protocols/index.html site/coaching/index.html site/story/index.html site/assets/css/tokens.css; do
            test -f "$f" || { echo "::error::missing required v4 file: $f"; exit 1; }
          done
          echo "✓ Home, Cockpit, Data, Protocols, Coaching, Story + tokens present"

  # ════════════════════════════════════════════════════════════════
  # PR-time LOCAL render + accuracy gate (#408 — shift QA left).
  # Reuses tests/visual_qa.py against site/ served from a LOCAL http.server
  # (no live site, no AWS, no deploy) so a broken layout or a leaked/impossible
  # number is caught BEFORE merge. Fails only on render-class regressions
  # (JS errors, layout overflow, stuck copy, prose sentinel leaks) + impossible
  # numbers; honest empty states pass. The post-deploy live visual-qa + accuracy
  # jobs in ci-cd.yml stay in place — this supplements, never replaces them.
  # ════════════════════════════════════════════════════════════════
  render-gate:
    name: Local render + accuracy gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright==1.58.0
          python -m playwright install --with-deps chromium

      - name: Render + accuracy gate (local serve, mocked API)
        run: python3 tests/pr_render_gate.py
