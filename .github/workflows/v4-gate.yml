# v4 "The Measured Life" front-end gate.
# Deliberately separate from ci-cd.yml: this guards the static site (three doors
# + /legacy coverage) and has NO AWS access and NO deploy capability. It runs on
# PRs into main and on pushes to main, so the migration coverage can never
# regress below 0-unmapped before/at the cutover. Self-skips until the /legacy
# relocation exists, so it's a no-op for unrelated history.
name: v4 site gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/v4_*.py'
      - '.github/workflows/v4-gate.yml'
      # #408: the PR-time render/accuracy gate harness — a change to it must re-run
      # the gate against itself.
      - 'tests/pr_render_gate.py'
      - 'tests/visual_qa.py'
      - 'tests/accuracy_audit.py'
      # #1039: the realistic-data fixtures the render gate's populated pass mocks
      # with — a fixture-shape change must re-run the gate against itself too.
      - 'tests/fixtures/render_gate/**'
      # #1432: the JS module-graph import gate — a change to it must re-run itself.
      - 'scripts/import_site_js_graph.mjs'
      - 'scripts/site_js_loader.mjs'
      # #1431: the JS unit-test harness — a change to it (or the dev-only
      # package.json that names it) must re-run the gate against itself.
      - 'tests/js/**'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/v4_*.py'
      - 'tests/js/**'
      - 'package.json'

permissions:
  contents: read

# CI-minutes hygiene (#1453): a superseded push/PR update cancels its predecessor's
# still-running gate instead of letting both burn Actions minutes to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  site-gate:
    name: Migration coverage + HTML well-formedness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Migration coverage gate (0 unmapped)
        run: |
          if [ -d site/legacy ]; then
            echo "::group::v4 migration inventory"
            python3 scripts/v4_migration_inventory.py
            echo "::endgroup::"
          else
            echo "site/legacy/ not present — v4 migration gate skipped (pre-relocation)."
          fi

      - name: HTML well-formedness (all of site/)
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          import glob, sys
          bad = 0
          for f in glob.glob("site/**/*.html", recursive=True):
              try:
                  HTMLParser(convert_charrefs=True).feed(open(f, encoding="utf-8").read())
              except Exception as e:
                  print(f"  PARSE FAIL {f}: {e}"); bad += 1
          print(f"checked HTML files; {bad} parse error(s)")
          sys.exit(1 if bad else 0)
          PY

      - name: Core v4 doors present
        run: |
          for f in site/index.html site/cockpit/index.html site/data/index.html site/protocols/index.html site/coaching/index.html site/story/index.html site/assets/css/tokens.css; do
            test -f "$f" || { echo "::error::missing required v4 file: $f"; exit 1; }
          done
          echo "✓ Home, Cockpit, Data, Protocols, Coaching, Story + tokens present"

      # ────────────────────────────────────────────────────────────────
      # JS module-graph import gate (#1432) — replaces `node --check`.
      # `node --check` (any flavor — plain file-mode OR --input-type=module)
      # can MISS a real SyntaxError buried in a function body (V8 lazy/pre-
      # parse skips full validation there — see #1156/#1159, memory
      # reference_node_check_lazy_parse). A real `import()` forces Node to
      # fully parse every module, top to bottom, before any code runs — the
      # guarantee `--check` can't give at any flag setting. GitHub-hosted
      # runners ship Node, so no setup-node step is needed (same assumption
      # deploy/sync_site_to_s3.sh's existing #377 gate already makes).
      # ────────────────────────────────────────────────────────────────
      - name: JS module-graph import gate (#1432 — real import(), not node --check)
        run: node scripts/import_site_js_graph.mjs

      # ────────────────────────────────────────────────────────────────
      # JS unit-test harness (#1431) — the first front-end unit tests. #1432's
      # import gate above proves every module PARSES; it says nothing about
      # BEHAVIOR (a chart can parse clean and still draw a lying trend line,
      # a formatter can silently mis-round). This exercises the pure
      # functions in charts.js (scales/paths/the >=4-points honesty rule),
      # evidence.js's router mapping (evidence_router.js, split out for
      # testability — no behavior change), and the shared formatters
      # (evidence_shared.js) — all ~40 pages' worth of blast radius. Node's
      # built-in node:test runner: zero production dependency, the
      # dev-only package.json at repo root names it (CLAUDE.md "No
      # framework/deps" — the SITE stays framework-free; this harness never
      # ships). GitHub-hosted runners ship Node, so no setup-node/npm-install
      # step is needed — same assumption the import-graph gate above makes.
      # ────────────────────────────────────────────────────────────────
      - name: JS unit tests (#1431 — charts.js, evidence.js router, formatters)
        run: node --test

  # ════════════════════════════════════════════════════════════════
  # Render + accuracy gate (#408) — shift-left QA on site PRs.
  # Runs the SAME Playwright render harness as the post-deploy visual-qa job,
  # but against a LOCAL static serve of site/ with the API mocked — so broken
  # layouts, JS render errors, and leaked impossible numbers are caught BEFORE
  # merge instead of after they reach readers. No AWS, no deploy, no live data.
  # PR-only: the post-deploy live sweep (ci-cd.yml visual-qa) still covers pushes.
  # ════════════════════════════════════════════════════════════════
  render-accuracy-gate:
    name: Render + accuracy gate (local render)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright==1.61.0
          python -m playwright install --with-deps chromium

      - name: Render + accuracy gate (headless local render, mocked API)
        run: python3 tests/pr_render_gate.py --out qa-render-gate --keep

      - name: Upload render-gate capture
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-render-gate-capture
          path: qa-render-gate/
          retention-days: 14
