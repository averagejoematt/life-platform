# Life Platform CI/CD Pipeline
# MAINT-4: Automated lint → deploy → smoke test on push to main
#
# Architecture:
#   1. Lint (flake8 + py_compile syntax check) — runs on every push, no AWS access needed
#   2a. Deploy-critical tests — the FAST offline subset (marker: deploy_critical) that
#       GATES the chain (#416, ADR-117). `plan` depends on THIS, not the full suite.
#   2b. Unit Tests — the exhaustive suite; runs in parallel, still reds main, but no
#       longer skips deploy + the reader-facing visual-QA gate on an unrelated red test.
#   3. Plan — validates lambda_map.json, detects changed files, maps to Lambda functions
#   4. Deploy — requires manual approval (GitHub Environment: production)
#   5. Smoke test — invokes qa-smoke + canary, checks structured output
#   6. Auto-rollback — Lambda/MCP (smoke failure, TB7-25); shared-layer rollback
#      surfaced as a runbook in the failure notification. The SITE deploy +
#      auto-rollback (#393/#418) moved to .github/workflows/site-deploy.yml
#      (#750): the site ships on merge WITHOUT the production approval gate —
#      "merged but not deployed" was the drift class — with its own smoke +
#      visual-QA gates and rollback_site.sh auto-rollback.
#   7. Notify — posts to SNS on any failure
#
# AWS auth: OIDC federation (no long-lived keys)
# See deploy/setup_github_oidc.sh to create the IAM provider + role
#
# Changes from original (v3.5.8 → v3.6.0):
#   - Added py_compile syntax check step in Lint job
#   - Added lambda_map.json structural validation in Plan job
#   - Replaced sleep 10 with aws lambda wait function-updated (MCP + Lambda deploys)
#   - Added layer version verification after shared layer rebuild
#   - Fixed smoke test and canary to parse JSON output, not grep for "error"
#   - Added notify-failure job that posts to SNS life-platform-alerts on any failure
# Changes (v3.7.9):
#   - Added rollback-on-smoke-failure job (TB7-25): auto-rollback when smoke test fails
#     after a successful deploy. Calls deploy/rollback_lambda.sh for each deployed function.
#     Requires deploy_lambda.sh to have stored artifacts to s3://matthew-life-platform/deploys/

name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/**'
      - 'mcp/**'
      - 'mcp_server.py'
      - 'tests/**'          # test-only changes must re-validate the suite (else CI red lingers)
      # DEVOPS-01 (AUDIT 2026-06-30): infra/config/tooling were EXCLUDED, so IAM, alarm,
      # and layer-version changes reached main with NO pipeline — and the auto-merge
      # ALLOWLIST (role_policies.py, monitoring_stack.py, ci/lambda_map.json) relies on
      # an on-main re-run that therefore never happened. These paths close that hole.
      - 'cdk/**'                 # IAM / alarms / layer version → must hit Lint + Plan
      - 'ci/**'                  # lambda_map.json / deploy-manifest drift
      - 'config/**'              # config that feeds Lambdas (content_filter, personas, goals)
      - '.github/workflows/**'   # workflow edits must re-validate
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.flake8'
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy ALL Lambdas (skip change detection)'
        required: false
        type: boolean
        default: false

# V2 P4.14 (2026-05-17): prevent concurrent deploys racing on the same branch.
# cancel-in-progress=false because a deploy mid-flight should complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: "205930651321"  # CONF-03: single place — override via GitHub env var for staging
  LAMBDA_MAP: ci/lambda_map.json
  SNS_TOPIC_ARN: arn:aws:sns:us-west-2:205930651321:life-platform-alerts-digest  # 2026-05-25: was life-platform-alerts (immediate-email). CI failure notifications now batch into the daily digest like all other alerts (per the inbox-noise mitigation sweep). CONF-03 follow-up: construct from AWS_ACCOUNT_ID.

permissions:
  id-token: write   # OIDC token for AWS
  contents: read    # Checkout code

jobs:
  # ════════════════════════════════════════════════════════════════
  # Job 1: Lint + Syntax Check
  # ════════════════════════════════════════════════════════════════
  lint:
    name: Lint + Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'  # V2 P4.14: speeds up CI by ~20s per job

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          echo "::group::Linting lambdas/"
          flake8 lambdas/ --count --show-source --statistics || true
          echo "::endgroup::"

          echo "::group::Linting mcp/"
          flake8 mcp/ --count --show-source --statistics || true
          echo "::endgroup::"

          # Fail on syntax errors and undefined names; pass on style warnings
          flake8 lambdas/ mcp/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Install black + ruff
        # if: always() (here + on every gate below) — #749: the lint gates used to
        # run strictly sequentially, so the FIRST red gate stopped the job and MASKED
        # every gate after it (fix black → discover ruff was also red → fix → discover
        # mypy → …, one push per layer). always() makes each gate run and report
        # independently in ONE run, so all violations surface at once. Gating is
        # unchanged: any red gate still fails the job (each step's own non-zero exit),
        # which still skips test-critical → plan → deploy.
        if: always()
        run: pip install black==25.9.0 ruff==0.14.14

      - name: Format gate (black — ENFORCED, config in pyproject.toml)
        if: always()
        run: black --check lambdas/ mcp/ cdk/ tests/ scripts/ deploy/

      - name: Lint gate (ruff — ENFORCED; import-sort via ruff's isort rules)
        if: always()
        run: ruff check lambdas/ mcp/ cdk/ tests/ scripts/ deploy/

      - name: Mypy gate (ENFORCED — clean-module set, ADR-080)
        if: always()
        run: |
          pip install mypy==2.1.0
          echo "::group::Mypy on the clean-module set (tier-1 core + split AI modules + tier-2 web/)"
          # Authoritative list: tests/test_mypy_clean_modules.py::MYPY_CLEAN_MODULES.
          # Tier-1 (budget/auth/inference): secret_cache, retry_utils, phase_filter,
          # constants, bedrock_client. Tier-2 (#419): the small, already-clean
          # slice of the public serving surface (web/*.py) — see that file's
          # comment for what's excluded and why. Blocking — a type regression
          # here fails CI.
          python -m mypy --config-file mypy.ini \
            lambdas/secret_cache.py lambdas/retry_utils.py lambdas/phase_filter.py \
            lambdas/constants.py lambdas/bedrock_client.py lambdas/scoring_engine.py \
            lambdas/character_engine.py lambdas/intelligence_common.py lambdas/ai_calls.py \
            lambdas/ai_context.py lambdas/ai_summaries.py \
            lambdas/web/site_api_common.py lambdas/web/site_api_coach.py \
            lambdas/web/site_api_intelligence.py lambdas/web/site_api_reading.py \
            lambdas/web/site_api_vitals.py lambdas/web/site_stats_refresh_lambda.py \
            lambdas/web/og_image_lambda.py lambdas/web/og_moments.py
          echo "::endgroup::"

      - name: Syntax check (py_compile)
        # Catches broken syntax that flake8 misses (e.g. invalid f-strings, truncated files)
        if: always()
        run: |
          echo "::group::Syntax checking lambdas/ and mcp/"
          FAILED=0
          while IFS= read -r -d '' f; do
            if python3 -m py_compile "$f" 2>&1; then
              echo "  ✅ $f"
            else
              echo "  ❌ SYNTAX ERROR: $f"
              FAILED=$((FAILED + 1))
            fi
          done < <(find lambdas/ mcp/ -name '*.py' -print0)
          echo "::endgroup::"
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED file(s) failed syntax check"
            exit 1
          fi
          echo "✅ All files pass syntax check"

      - name: Dependency Security Scan (advisory)
        # pip-audit for known CVEs. 2026-06-09 (Tier-1 hardening): broadened from
        # cdk-only to BOTH dependency manifests + a loud, actionable warning on any
        # finding (the platform's "advisory-but-visible" pattern). Stays NON-blocking
        # — Dependabot (.github/dependabot.yml) opens the fix PRs, so a sudden
        # unfixable transitive CVE never red-walls deploys. (Lambda runtime is
        # stdlib-only, so there is no lambdas/ requirements to scan.)
        if: always()
        run: |
          pip install pip-audit 2>/dev/null
          FOUND=0
          for req in requirements-dev.txt cdk/requirements.txt; do
            echo "::group::pip-audit $req"
            pip-audit -r "$req" --desc on 2>&1 || FOUND=1
            echo "::endgroup::"
          done
          if [ "$FOUND" = "1" ]; then
            echo "::warning title=Dependency vulnerability (advisory)::pip-audit flagged known CVEs — review the grouped logs; Dependabot will open a bump PR for the affected package."
          fi
          echo "Dependency scan complete — advisory (non-blocking); Dependabot drives remediation."

      - name: Check lambda_map coverage
        # R18-F03: Detect Lambda source files missing from ci/lambda_map.json.
        # 2026-05-28: the old `for f in lambdas/*_lambda.py` glob matched ZERO
        # files after the P3.1 subpackage restructure (everything moved under
        # lambdas/<domain>/), so this check silently passed and let unmapped
        # Lambdas slip through (the qa-smoke / lambda_map drift class). Now uses
        # a recursive find and FAILS the build — a Lambda source must be mapped.
        if: always()
        run: |
          MISSING=0
          while IFS= read -r f; do
            if ! grep -q "\"$f\"" ci/lambda_map.json; then
              echo "::error file=$f::Lambda source file not in ci/lambda_map.json — add it to the .lambdas section"
              MISSING=$((MISSING + 1))
            fi
          done < <(find lambdas -name '*_lambda.py' -o -name '*_handler.py')
          if [ $MISSING -gt 0 ]; then
            echo "::error::$MISSING Lambda source file(s) missing from lambda_map.json"
            exit 1
          else
            echo "✅ All Lambda source files present in lambda_map.json"
          fi

      - name: Content-policy scan (ENFORCED — #354)
        # Scans public-facing surfaces (site/, email lambdas, mcp/) for blocked terms
        # from seeds/content_filter.json — the same list the runtime filter enforces.
        # Catches personal-content leaks before they reach the public repo.
        if: always()
        run: python3 scripts/content_policy_scan.py

      - name: Doc-drift gate (ENFORCED — #389)
        # sync_doc_metadata.py --check asserts the literal counts quoted in CLAUDE.md
        # and docs/*.md (tool/Lambda/module/ADR/test counts, served PLATFORM_STATS)
        # against what AST/regex discovery finds in the source right now. Writes
        # nothing; a mismatch means a fact changed (new tool, new Lambda, new ADR,
        # new test) and nobody reran `sync_doc_metadata.py --apply` before merging.
        if: always()
        run: python3 deploy/sync_doc_metadata.py --check

      - name: Wiki gates (ENFORCED — links, tombstones, index, ADR index)
        # The wiki drift machinery (CONVENTIONS §8): dead relative links, live docs
        # referencing retired concepts (docs/_lint/tombstones.txt), index coverage +
        # status headers, and the generated ADR index being current. docs-ci.yml runs
        # the same gates on docs-only pushes; this copy catches code pushes that
        # invalidate docs (e.g. deleting a script a doc links to).
        if: always()
        run: |
          python3 scripts/check_doc_links.py
          python3 scripts/check_doc_tombstones.py
          python3 scripts/check_doc_index.py --strict
          python3 scripts/generate_adr_index.py --check

  # ════════════════════════════════════════════════════════════════
  # Job 2a: Deploy-critical test lane (#416, ADR-117) — GATES the chain
  # ════════════════════════════════════════════════════════════════
  # The FAST, fully-offline subset that decides whether a deploy is SAFE:
  # the deploy contract (Lambda handler names/signatures, shared-layer
  # module presence + consumer wiring, MCP tool registration, IAM role
  # policies, secret-name references, DDB key patterns, CDK↔source
  # consistency) + the reader-facing AI-output honesty gate. `plan`
  # depends on THIS job, NOT the exhaustive `test` job below — so one
  # unrelated red unit test no longer skips deploy AND the reader-facing
  # visual-QA safety net (the "red main blacks out visual QA" failure).
  # The exhaustive suite still runs (job `test`, in parallel) and still
  # reds main + fires notify-failure; it just no longer gates the chain.
  # Inclusion criteria + the exact file list live in docs/CONVENTIONS.md
  # ("Deploy-critical test lane") and are enforced by the `deploy_critical`
  # pytest marker (pytest.ini). `not integration` keeps the one live-AWS
  # test in a marked file (test_lv6) out of this creds-free lane.
  test-critical:
    name: Deploy-critical tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install test dependencies
        run: pip install pytest boto3 botocore

      - name: Run deploy-critical test lane
        run: |
          echo "::group::Deploy-critical lane — pytest -m 'deploy_critical and not integration'"
          python3 -m pytest tests/ -m "deploy_critical and not integration" -v --tb=short
          echo "::endgroup::"

  # ════════════════════════════════════════════════════════════════
  # Job 2b: Unit Tests — the exhaustive offline suite
  # ════════════════════════════════════════════════════════════════
  # NON-GATING for deploy since #416/ADR-117: nothing downstream `needs`
  # this job except notify-failure, so a red here still flags main (and
  # emails a CI failure) but no longer skips plan → deploy → visual-QA.
  # The deploy-gating subset is job `test-critical` above.
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'  # V2 P4.14: speeds up CI by ~20s per job

      - name: Install test dependencies
        run: pip install pytest pytest-cov boto3 botocore  # Phase 8.2: pytest-cov for coverage report

      - name: Run unit tests
        run: |
          echo "::group::Running tests/test_shared_modules.py"
          python3 -m pytest tests/test_shared_modules.py -v --tb=short
          echo "::endgroup::"

      - name: IAM policy linter (test_role_policies.py)
        run: |
          echo "::group::IAM policy linter"
          python3 -m pytest tests/test_role_policies.py -v --tb=short
          echo "::endgroup::"

      - name: CDK handler consistency linter (test_cdk_handler_consistency.py)
        run: |
          echo "::group::CDK handler consistency linter"
          python3 -m pytest tests/test_cdk_handler_consistency.py -v --tb=short
          echo "::endgroup::"

      - name: CDK S3 path linter (test_cdk_s3_paths.py)
        run: |
          echo "::group::CDK S3 path linter"
          python3 -m pytest tests/test_cdk_s3_paths.py -v --tb=short
          echo "::endgroup::"

      - name: Safety module wiring linter (test_wiring_coverage.py)
        run: |
          echo "::group::Wiring coverage linter"
          python3 -m pytest tests/test_wiring_coverage.py -v --tb=short
          echo "::endgroup::"

      - name: DynamoDB pattern linter (test_ddb_patterns.py)
        run: |
          echo "::group::DynamoDB pattern linter"
          python3 -m pytest tests/test_ddb_patterns.py -v --tb=short
          echo "::endgroup::"

      - name: MCP registry integrity linter (test_mcp_registry.py)
        run: |
          echo "::group::MCP registry integrity linter"
          python3 -m pytest tests/test_mcp_registry.py -v --tb=short
          echo "::endgroup::"

      - name: Lambda handler integration linter (test_lambda_handlers.py)
        # TB7-24: I1-I6 — file existence, syntax, handler signature, try/except, orphans, MCP entry point
        run: |
          echo "::group::Lambda handler integration linter"
          python3 -m pytest tests/test_lambda_handlers.py -v --tb=short
          echo "::endgroup::"

      - name: Deprecated secrets scan
        run: |
          echo "::group::Deprecated secrets scan"
          FAILED=0

          while IFS= read -r line; do
            secret=$(echo "$line" | sed 's/#.*//' | xargs)
            [ -z "$secret" ] && continue

            echo "Scanning for deprecated secret: $secret"
            MATCHES=$(grep -rn --include='*.py' --include='*.json' --include='*.yml' --include='*.yaml' --include='*.sh' "$secret" \
              lambdas/ mcp/ cdk/ .github/ ci/ \
              --exclude-dir='.venv' --exclude-dir='cdk.out' \
              2>/dev/null | grep -v 'deprecated_secrets.txt' | grep -v '^Binary' || true)

            if [ -n "$MATCHES" ]; then
              echo "::error::Deprecated secret '$secret' still referenced:"
              echo "$MATCHES" | head -20
              FAILED=$((FAILED + 1))
            else
              echo "  ✅ No references to '$secret'"
            fi
          done < ci/deprecated_secrets.txt

          echo "::endgroup::"
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED deprecated secret(s) still referenced. Update to current secret names before merging."
            exit 1
          fi
          echo "✅ Deprecated secrets scan passed"

      - name: IAM/secrets consistency linter (test_iam_secrets_consistency.py)
        # R8-8: Cross-refs IAM secret ARN patterns against known-secrets list
        run: |
          echo "::group::IAM/secrets consistency linter"
          python3 -m pytest tests/test_iam_secrets_consistency.py -v --tb=short
          echo "::endgroup::"

      - name: Secret references linter (test_secret_references.py)
        # R13-F04: Validates Lambda source secret name literals against known-secrets list.
        # Prevents Todoist-style 2-day outage caused by wrong SECRET_NAME default value.
        run: |
          echo "::group::Secret references linter"
          python3 -m pytest tests/test_secret_references.py -v --tb=short
          echo "::endgroup::"

      - name: Upstream-API contract tests (test_upstream_contracts.py)
        # ER-02: assert each active source's transform contract against committed,
        # scrubbed fixtures (tests/fixtures/upstream/**). Catches vendor payload
        # drift (field rename/renest/retype) before it corrupts data at 4 AM.
        # Fully offline — no live AWS/vendor calls; the live-refresh path is
        # deploy/refresh_upstream_fixtures.py (run by hand, with creds).
        run: |
          echo "::group::Upstream-API contract tests (ER-02)"
          python3 -m pytest tests/test_upstream_contracts.py -v --tb=short
          echo "::endgroup::"

      - name: Full test suite
        # R20-F01: Run the complete pytest suite (excluding AWS integration tests)
        run: |
          echo "::group::Full pytest suite"
          python3 -m pytest tests/ -v --tb=short --ignore=tests/test_integration_aws.py
          echo "::endgroup::"

      - name: Test coverage gate (regression floor, ADR-080)
        # ENFORCED regression floor. The codebase is integration-tested (handlers
        # run live; the ~3000 offline tests are mostly structural/contract), so the
        # offline line-coverage baseline is ~28% (#419 ratchet, up from a stale ~9%
        # comment/8% flag that had drifted apart while hundreds of tests were added
        # without anyone moving the floor) — this floor (25%) prevents BACKSLIDING,
        # it is not a quality bar. Ratchet up over time (ADR-080).
        # Scope: lambdas/ + mcp/ only (skip tests/, cdk/).
        run: |
          echo "::group::Coverage report + gate"
          python3 -m pytest tests/ \
              --ignore=tests/test_integration_aws.py \
              --cov=lambdas --cov=mcp \
              --cov-report=term-missing:skip-covered \
              --cov-report=xml:coverage.xml \
              --cov-fail-under=25 \
              -q 2>&1 | tail -100
          echo "::endgroup::"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
        if: always()

  # ════════════════════════════════════════════════════════════════
  # Job 3: Plan — validate map, detect changes, build deploy plan
  # ════════════════════════════════════════════════════════════════
  plan:
    name: Plan deployments
    runs-on: ubuntu-latest
    # #416/ADR-117: gate on the fast deploy-critical lane, NOT the exhaustive
    # `test` suite — an unrelated red unit test must not skip deploy + visual-QA.
    needs: [lint, test-critical]
    outputs:
      deploy_matrix: ${{ steps.plan.outputs.matrix }}
      has_deploys: ${{ steps.plan.outputs.has_deploys }}
      fleet_changed: ${{ steps.plan.outputs.fleet_changed }}
      mcp_changed: ${{ steps.plan.outputs.mcp_changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2  # Need HEAD~1 for diff

      - name: Validate lambda_map.json
        run: |
          echo "Validating ci/lambda_map.json..."
          MISSING=0

          echo "Checking Lambda source files..."
          while IFS= read -r src; do
            if [ ! -f "$src" ]; then
              echo "  ❌ MISSING source: $src (in .lambdas — file not found in repo)"
              MISSING=$((MISSING + 1))
            fi
          done < <(jq -r '.lambdas | keys[]' ci/lambda_map.json)

          if [ "$MISSING" -gt 0 ]; then
            echo "::error::lambda_map.json references $MISSING missing file(s). Update ci/lambda_map.json to match current repo state."
            exit 1
          fi
          echo "✅ lambda_map.json valid — all source files present"

      - name: Configure AWS credentials (OIDC) — plan
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK diff — detect IAM/infra drift
        run: |
          echo "::group::CDK diff"
          node --version
          # Pinned exactly (#814, R22-MOD-01) — an unpinned `npm install -g aws-cdk`
          # always pulls whatever released today, so a routine push can red CI on an
          # untested CDK release. Bump deliberately, in lockstep with cdk/requirements.txt.
          npm install -g aws-cdk@2.1129.0 --quiet

          cd cdk
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt --quiet

          set +e
          npx cdk diff --all 2>&1 | tee /tmp/cdk_diff.txt
          CDK_EXIT=$?
          set -e

          echo "::endgroup::"

          # Flag RESOURCE-level removals only (lines starting '[-] AWS::…'). Property
          # old-value lines (indented '├─ [-] <hash>.zip' halves of [~] changes) are
          # normal — post-#781 every lambdas/ change legitimately moves ~90 functions'
          # Code hashes. This gate was historically MASKED by the layer-consistency
          # step ahead of it (red since v116 drift); #781 removed that step and
          # unmasked the over-broad grep.
          if grep -qE '^\[-\] AWS::|destroy|Destroy' /tmp/cdk_diff.txt; then
            echo "::error::CDK diff detected resource DESTRUCTIONS — review before deploying:"
            grep -E '^\[-\] AWS::|destroy|Destroy' /tmp/cdk_diff.txt | head -20
            exit 1
          fi

          if grep -qi 'iam\|policy\|role\|permission' /tmp/cdk_diff.txt; then
            echo "::error::CDK diff detected IAM/policy changes — R8-ST6 gate: review and approve manually before deploying."
            echo "Changes detected:"
            grep -i 'iam\|policy\|role\|permission' /tmp/cdk_diff.txt | head -20
            echo ""
            echo "If these changes are intentional, run 'cdk deploy' locally and verify with post_cdk_reconcile_smoke.sh before re-pushing."
            exit 1
          fi

          if grep -qi 'InlinePolicy\|inline_policy\|QaSmokeKmsAccess\|CanaryKmsAccess' /tmp/cdk_diff.txt; then
            echo "::warning::CDK diff detected inline policy drift — a manual console fix may not be in CDK yet"
          fi

          # ── Undeployed Lambda CONFIG drift (R20-F02, 2026-06-08) ──
          # CI deploys Lambda CODE only (deploy_lambda.sh). Config properties —
          # Handler, Runtime, Memory, Timeout, Environment, Layers — ship ONLY via
          # `cdk deploy`, so a merged config change silently does NOT reach AWS until
          # someone runs it (this is exactly how the og-image handler fix sat
          # undeployed for ~3 months). Surface it LOUDLY + actionably. Code/asset-hash
          # drift is expected from deploy_lambda.sh and intentionally NOT flagged here.
          awk '
            /^Stack / { stack = $2 }
            /\[~\] (Handler|Runtime|MemorySize|Timeout|Environment|Layers|Architectures)/ {
              if (stack && !seen[stack]++) print stack
            }
          ' /tmp/cdk_diff.txt > /tmp/config_drift_stacks.txt
          if [ -s /tmp/config_drift_stacks.txt ]; then
            echo "════════════════════════════════════════════════════════════"
            echo "  ⚠️  MERGED LAMBDA CONFIG CHANGES NOT DEPLOYED BY CI"
            echo "  (CI ships CODE only — config needs a manual cdk deploy)"
            echo "════════════════════════════════════════════════════════════"
            while read -r s; do
              echo "  • $s   →   cd cdk && npx cdk deploy $s"
              echo "::warning title=Run: cdk deploy $s::$s has a Lambda config change (handler/runtime/memory/timeout/env/layer) that CI's code-deploy cannot ship. Run locally: cd cdk && npx cdk deploy $s"
            done < /tmp/config_drift_stacks.txt
            echo "════════════════════════════════════════════════════════════"
          fi

          if [ "$CDK_EXIT" -ne 0 ]; then
            echo "::warning::cdk diff exited $CDK_EXIT (non-zero is normal when changes detected)"
          fi
          echo "✅ CDK diff complete"

      - name: Assert stateful resources exist
        run: |
          FAILED=0

          echo "Checking DynamoDB table: life-platform"
          if aws dynamodb describe-table --table-name life-platform \
               --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "  ✅ DynamoDB: life-platform"
          else
            echo "  ❌ DynamoDB table 'life-platform' not found — wrong account or region?"
            FAILED=$((FAILED + 1))
          fi

          echo "Checking S3 bucket: matthew-life-platform"
          if aws s3api head-bucket --bucket matthew-life-platform 2>/dev/null; then
            echo "  ✅ S3: matthew-life-platform"
          else
            echo "  ❌ S3 bucket 'matthew-life-platform' not found"
            FAILED=$((FAILED + 1))
          fi

          echo "Checking SNS topic: life-platform-alerts"
          if aws sns get-topic-attributes \
               --topic-arn "arn:aws:sns:us-west-2:205930651321:life-platform-alerts" \
               --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "  ✅ SNS: life-platform-alerts"
          else
            echo "  ❌ SNS topic 'life-platform-alerts' not found"
            FAILED=$((FAILED + 1))
          fi

          echo "Checking KMS key: alias/life-platform-dynamodb"
          if aws kms describe-key --key-id alias/life-platform-dynamodb \
               --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "  ✅ KMS: alias/life-platform-dynamodb"
          else
            echo "  ❌ KMS key 'alias/life-platform-dynamodb' not found"
            FAILED=$((FAILED + 1))
          fi

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED stateful resource(s) missing — wrong account or region? (account=205930651321 region=us-west-2)"
            exit 1
          fi
          echo "✅ All stateful resources verified"

      - name: Verify shared layer is fully retired (#781)
        run: |
          # The shared layer (life-platform-shared-utils) is retired — shared
          # code ships inside every function bundle. Any function still
          # referencing it is drift from before the collapse (or a regression
          # re-attaching it). Dependency layers (garth, pillow) are fine.
          LAYER_NAME="life-platform-shared-utils"
          ATTACHED=$(aws lambda list-functions \
            --region ${{ env.AWS_REGION }} \
            --query "Functions[?Layers[?contains(Arn, '$LAYER_NAME')]].FunctionName" \
            --output text 2>/dev/null || echo "")
          if [ -n "$ATTACHED" ] && [ "$ATTACHED" != "None" ]; then
            echo "::error::function(s) still reference $LAYER_NAME: $ATTACHED — run 'cd cdk && npx cdk deploy <their stacks>' to converge (bundles carry the shared code now)"
            exit 1
          fi
          echo "✅ No function references $LAYER_NAME — single-channel invariant holds"

      - name: Validate handler function names
        run: |
          echo "::group::Handler consistency check"
          FAILED=0

          while IFS= read -r src; do
            [ -f "$src" ] || continue
            if ! grep -q '^def lambda_handler' "$src"; then
              echo "::error::$src: missing 'def lambda_handler' — handler function not found"
              FAILED=$((FAILED + 1))
            else
              echo "  ✅ $src"
            fi
          done < <(jq -r '.lambdas | keys[]' ci/lambda_map.json)

          echo "::endgroup::"
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED Lambda source file(s) missing def lambda_handler"
            exit 1
          fi
          echo "✅ All Lambda source files define lambda_handler"

      - name: Detect changes and build deploy plan
        id: plan
        run: |
          set -e

          if [ "${{ github.event.inputs.deploy_all }}" = "true" ]; then
            echo "Manual deploy-all triggered — deploying everything"
            CHANGED=$(find lambdas/ mcp/ -name '*.py' -type f)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- lambdas/ mcp/ mcp_server.py 2>/dev/null || \
                      find lambdas/ mcp/ -name '*.py' -type f)
          fi

          echo "Changed files:"
          echo "$CHANGED" | head -50

          LAMBDA_MAP_FILE="${{ env.LAMBDA_MAP }}"

          # #781: the shared layer is retired. A changed file under lambdas/ that
          # is NOT a mapped per-function source is a shared module — it ships to
          # every function, so the FLEET redeploys (deploy/deploy_fleet.sh: one
          # bundle, one S3 upload, N update-function-code calls). This also
          # closes the old silent gap where an unmapped helper module deployed
          # to nobody. food_vocabulary.json rides inside the bundle too.
          FLEET_CHANGED="false"
          VOCAB_CHANGED=$(git diff --name-only HEAD~1 HEAD -- config/food_vocabulary.json 2>/dev/null || true)
          [ -n "$VOCAB_CHANGED" ] && FLEET_CHANGED="true" && echo "⚡ food_vocabulary.json changed → fleet deploy"
          for file in $CHANGED; do
            case "$file" in
              lambdas/*)
                MAPPED=$(jq -r --arg f "$file" '.lambdas[$f].function // empty' "$LAMBDA_MAP_FILE")
                if [ -z "$MAPPED" ]; then
                  FLEET_CHANGED="true"
                  echo "⚡ Shared module changed: $file → fleet deploy"
                fi
                ;;
            esac
          done
          echo "fleet_changed=$FLEET_CHANGED" >> "$GITHUB_OUTPUT"

          MCP_CHANGED="false"
          if echo "$CHANGED" | grep -q "^mcp/" || echo "$CHANGED" | grep -q "mcp_server.py"; then
            MCP_CHANGED="true"
            echo "⚡ MCP server changed"
          fi
          echo "mcp_changed=$MCP_CHANGED" >> "$GITHUB_OUTPUT"

          # Public-site deploys moved OUT of this pipeline (#750): a push touching
          # site/ triggers .github/workflows/site-deploy.yml, which deploys the merged
          # main tree WITHOUT the production approval gate (that gate was the
          # merged-but-not-deployed drift class for the site) and runs its own smoke +
          # visual-QA gates + rollback_site.sh auto-rollback. Single owner — no
          # site_changed detection here anymore (#393's in-pipeline site deploy retired).

          DEPLOYS="[]"

          for file in $CHANGED; do
            FUNC=$(jq -r --arg f "$file" '.lambdas[$f].function // empty' "$LAMBDA_MAP_FILE")
            if [ -n "$FUNC" ]; then
              DEPLOYS=$(echo "$DEPLOYS" | jq --arg fn "$FUNC" --arg src "$file" '. + [{"function": $fn, "source": $src}]')
            fi
          done

          DEPLOYS=$(echo "$DEPLOYS" | jq 'unique_by(.function)')

          COUNT=$(echo "$DEPLOYS" | jq 'length')
          echo "📋 Deploy plan: $COUNT Lambda(s)"
          echo "$DEPLOYS" | jq -r '.[] | "  → \(.function) (\(.source))"'

          HAS_DEPLOYS="false"
          if [ "$COUNT" -gt 0 ] || [ "$MCP_CHANGED" = "true" ] || [ "$FLEET_CHANGED" = "true" ]; then
            HAS_DEPLOYS="true"
          fi

          echo "has_deploys=$HAS_DEPLOYS" >> "$GITHUB_OUTPUT"
          echo "matrix=$(echo "$DEPLOYS" | jq -c '.')" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════════
  # Job 4: Deploy (manual approval gate)
  # ════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.has_deploys == 'true'
    environment: production   # ← Manual approval gate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Fleet deploy (shared module changed)
        if: needs.plan.outputs.fleet_changed == 'true'
        run: |
          echo "═══ Shared module changed — deploying the bundle fleet-wide ═══"
          # #781: one staged bundle (deploy/build_bundle.py), one S3 upload,
          # N update-function-code calls. Covers MCP (mcp-shaped bundle) too,
          # so the per-function and MCP steps below are skipped when this runs.
          bash deploy/deploy_fleet.sh

      - name: Deploy MCP server
        if: needs.plan.outputs.mcp_changed == 'true' && needs.plan.outputs.fleet_changed != 'true'
        run: |
          echo "═══ Deploying MCP server (full bundle, #781) ═══"

          WORK_DIR=$(mktemp -d)
          python3 deploy/build_bundle.py --mcp --out "$WORK_DIR/stage" --zip "$WORK_DIR/deploy.zip"

          # S3 rollback artifact for MCP
          BUCKET="matthew-life-platform"
          if aws s3 ls "s3://$BUCKET/deploys/life-platform-mcp/latest.zip" \
               --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            aws s3 cp "s3://$BUCKET/deploys/life-platform-mcp/latest.zip" \
              "s3://$BUCKET/deploys/life-platform-mcp/previous.zip" \
              --region ${{ env.AWS_REGION }} > /dev/null
          fi
          aws s3 cp "$WORK_DIR/deploy.zip" \
            "s3://$BUCKET/deploys/life-platform-mcp/latest.zip" \
            --region ${{ env.AWS_REGION }} > /dev/null
          echo "💾 MCP rollback artifact stored"

          aws lambda update-function-code \
            --function-name life-platform-mcp \
            --zip-file "fileb://$WORK_DIR/deploy.zip" \
            --region ${{ env.AWS_REGION }} > /dev/null

          aws lambda wait function-updated \
            --function-name life-platform-mcp \
            --region ${{ env.AWS_REGION }}

          echo "✅ life-platform-mcp deployed"
          rm -rf "$WORK_DIR"

      - name: Deploy Lambdas
        if: needs.plan.outputs.fleet_changed != 'true'
        run: |
          MATRIX='${{ needs.plan.outputs.deploy_matrix }}'
          COUNT=$(echo "$MATRIX" | jq 'length')

          if [ "$COUNT" = "0" ]; then
            echo "No individual Lambdas to deploy"
            exit 0
          fi

          echo "═══ Deploying $COUNT Lambda(s) ═══"

          DEPLOYED=0
          FAILED=0

          for row in $(echo "$MATRIX" | jq -r '.[] | @base64'); do
            FUNC=$(echo "$row" | base64 -d | jq -r '.function')
            SRC=$(echo "$row" | base64 -d | jq -r '.source')

            echo ""
            echo "→ Deploying $FUNC from $SRC..."

            NATIVE=$(jq -r --arg f "$SRC" '.lambdas[$f].native_deps // false' "${{ env.LAMBDA_MAP }}")
            if [ "$NATIVE" = "true" ]; then
              echo "  ⚠️ SKIPPED: $FUNC has native deps (deploy manually with correct build env)"
              continue
            fi

            SKELETON=$(jq -r --arg f "$SRC" '.lambdas[$f].not_deployed // false' "${{ env.LAMBDA_MAP }}")
            if [ "$SKELETON" = "true" ]; then
              echo "  ⚠️ SKIPPED: $FUNC is a skeleton (\'not_deployed\' flag) — activate before deploying via CDK"
              continue
            fi

            if bash deploy/deploy_lambda.sh "$FUNC" "$SRC"; then
              aws lambda wait function-updated \
                --function-name "$FUNC" \
                --region ${{ env.AWS_REGION }}
              echo "  ✅ $FUNC deployed and active"
              DEPLOYED=$((DEPLOYED + 1))
            else
              echo "  ❌ FAILED: $FUNC"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "═══ Deploy complete: $DEPLOYED succeeded, $FAILED failed ═══"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED Lambda(s) failed to deploy"
            exit 1
          fi

      # ── Public site deploy: NOT here anymore (#750) ────────────────────────
      # #393 shipped the site inside this approval-gated job; #750 moved it to
      # .github/workflows/site-deploy.yml, which fires directly on any push to
      # main touching site/** (this pipeline's trigger paths never included
      # site/**, so site-only pushes ran no pipeline at all — the root of the
      # manual-deploy drift class). Site deploys must not wait on the
      # `environment: production` approval: merged-but-not-deployed IS the drift.

  # ════════════════════════════════════════════════════════════════
  # Job 5: Smoke test
  # ════════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Run QA smoke test
        run: |
          echo "Running qa-smoke Lambda..."

          # qa-smoke may not exist yet (CDK skeleton) — warn and continue
          if ! aws lambda get-function --function-name life-platform-qa-smoke --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "::warning::life-platform-qa-smoke Lambda does not exist in AWS — skipping (deploy via CDK to enable)"
            echo "Falling through to canary check as primary smoke test."
            exit 0
          fi

          aws lambda invoke \
            --function-name life-platform-qa-smoke \
            --payload '{}' \
            --region ${{ env.AWS_REGION }} \
            --cli-binary-format raw-in-base64-out \
            /tmp/smoke.json

          echo "Smoke test result:"
          python3 -m json.tool /tmp/smoke.json 2>/dev/null || cat /tmp/smoke.json

          STATUS=$(python3 -c "
          import json, sys
          try:
              result = json.load(open('/tmp/smoke.json'))
              status = result.get('status', result.get('statusCode', ''))
              s = str(status).lower()
              if s in ('ok', 'pass', '200') or (s and 'error' not in s and 'fail' not in s):
                  print('PASS')
              else:
                  print(f'FAIL:{status}')
          except Exception as e:
              print(f'PARSE_ERROR:{e}')
          ")

          if [[ "$STATUS" == PASS ]]; then
            echo "✅ Smoke test passed"
          elif [[ "$STATUS" == PARSE_ERROR* ]]; then
            echo "::warning::Could not parse smoke test output as JSON — check life-platform-qa-smoke Lambda response format"
          else
            echo "::error::Smoke test reported failure: $STATUS"
            exit 1
          fi

      - name: Verify canary
        run: |
          echo "Checking canary Lambda..."
          aws lambda invoke \
            --function-name life-platform-canary \
            --payload '{}' \
            --region ${{ env.AWS_REGION }} \
            --cli-binary-format raw-in-base64-out \
            /tmp/canary.json

          echo "Canary result:"
          python3 -m json.tool /tmp/canary.json 2>/dev/null || cat /tmp/canary.json

          STATUS=$(python3 -c "
          import json, sys
          try:
              result = json.load(open('/tmp/canary.json'))
              status = result.get('status', result.get('statusCode', ''))
              s = str(status).lower()
              if s in ('ok', 'pass', '200', 'healthy') or (s and 'error' not in s and 'fail' not in s):
                  print('PASS')
              else:
                  print(f'FAIL:{status}')
          except Exception as e:
              print(f'PARSE_ERROR:{e}')
          ")

          if [[ "$STATUS" == PASS ]]; then
            echo "✅ Canary healthy"
          elif [[ "$STATUS" == PARSE_ERROR* ]]; then
            echo "::warning::Could not parse canary output — check life-platform-canary response format"
          else
            echo "::error::Canary unhealthy after deploy: $STATUS — check CloudWatch logs"
            exit 1
          fi

  # ════════════════════════════════════════════════════════════════
  # Job 5c: Visual + AI-vision QA (Playwright → Claude). GATING.
  # Post-deploy browser sweep of the live v4 site (renders, the cockpit
  # pillar interaction, responsive overflow) + Claude/Bedrock semantic
  # judgement of each screenshot. A FAIL (deterministic, or an AI "high"
  # verdict) now BLOCKS the pipeline. The rollback job's `needs` excludes
  # visual-qa, so a gate failure blocks but never triggers an auto-rollback.
  # The deterministic layer was verified green against live prod on
  # 2026-06-05 (17 pages, 0 failures) before gating. NB: the AI-vision layer
  # self-skips (warning, not failure) when bedrock:InvokeModel is absent on
  # github-actions-deploy-role (re-run deploy/setup_github_oidc.sh to grant)
  # or when the budget guard is at tier 3 — so it cannot false-block. It was
  # not yet tuned under load; watch the first AI-active runs after a budget
  # reset and relax thresholds in tests/visual_ai_qa.py if it over-fires.
  # #749: the SAME sweep is also runnable standalone — .github/workflows/
  # visual-qa.yml (workflow_dispatch + daily 20:07 UTC) — so the reader-facing
  # net fires even when this pipeline copy is skipped (red upstream job, or a
  # push with nothing to deploy). Keep the two step lists in sync.
  # ════════════════════════════════════════════════════════════════
  visual-qa:
    name: Visual + AI-vision QA
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright==1.61.0
          python -m playwright install --with-deps chromium

      - name: Configure AWS credentials (OIDC — for Bedrock vision QA)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-diagnosis-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Run visual + AI-vision QA sweep
        run: |
          python3 tests/visual_qa.py --screenshot --ai-qa

      - name: Accuracy gate (per-page resolves + no impossible numbers)
        run: |
          # Truth-audit guardrail: every harness page must resolve (catches the
          # /data-vs-/method drift class) and public_stats must carry no impossible
          # value (negative CTL/ATL, out-of-range %). Gating — a HIGH finding fails.
          python3 tests/accuracy_audit.py --live

      - name: Upload screenshots + report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-qa-screenshots
          path: qa-screenshots/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════
  # Job 5b: Post-deploy integration checks (I1 / I2 / I5)
  # Runs after deploy succeeds, parallel to smoke-test.
  # I1: handler names in live AWS match expected module names
  # I2: shared layer version is current on all consumers
  # I5: required secrets exist (needs secretsmanager:DescribeSecret on OIDC role)
  #
  # ⚠️  I5 requires the github-actions-deploy-role to have:
  #     secretsmanager:DescribeSecret on life-platform/* secrets.
  #     If the role lacks this, I5 will be skipped (continue-on-error: true).
  #     To enable: add secretsmanager:DescribeSecret to role_policies for the
  #     github-actions-deploy-role CDK construct.
  # ════════════════════════════════════════════════════════════════
  post-deploy-checks:
    name: Post-deploy integration checks (I1/I2/I5)
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # I22 resolves the LIVE site's build SHA (older than HEAD by design —
          # version.json is stamped at sync time) via merge-base --is-ancestor;
          # the default depth-1 clone can't see any older commit, so I22 was
          # structurally unable to pass in CI. Full history fixes it (2026-07-08).
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'  # V2 P4.14: speeds up CI by ~20s per job

      - name: Install boto3 + pytest
        run: pip install boto3 pytest --quiet

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: I1 — Lambda handler names match expected module names
        # Catches CDK reconcile regression: CDK overwrites handler to lambda_function.lambda_handler
        # Root cause of 2026-03-12 P0 alarm flood.
        run: |
          python3 -m pytest tests/test_integration_aws.py::test_i1_lambda_handlers_match_expected \
            -v --tb=short -m integration 2>&1
          echo "I1 complete"

      - name: I2 — Shared layer retired (zero shared-utils references fleet-wide)
        # #781/ADR-131 renamed the I2 test when the shared layer was retired; the old
        # node id red the whole post-deploy job with a pytest collection error (exit 4).
        run: |
          python3 -m pytest tests/test_integration_aws.py::test_i2_shared_layer_retired \
            -v --tb=short -m integration 2>&1
          echo "I2 complete"

      - name: I4 — DynamoDB table healthy (deletion protection + PITR enabled)
        # Catastrophic if DDB deletion protection was accidentally disabled.
        run: |
          python3 -m pytest tests/test_integration_aws.py::test_i4_dynamodb_table_healthy \
            -v --tb=short -m integration 2>&1
          echo "I4 complete"

      - name: I5 — Required secrets exist in Secrets Manager
        # Catches stale SECRET_NAME env vars pointing at deleted secrets.
        continue-on-error: true
        run: |
          python3 -m pytest tests/test_integration_aws.py::test_i5_required_secrets_exist \
            -v --tb=short -m integration 2>&1
          echo "I5 complete"

      - name: I6 — Critical EventBridge rules exist and are enabled
        # Missing/disabled rules cause scheduled Lambdas to stop silently.
        run: |
          python3 -m pytest tests/test_integration_aws.py::test_i6_eventbridge_rules_exist_and_enabled \
            -v --tb=short -m integration 2>&1
          echo "I6 complete"

      - name: I7 — CloudWatch alarm count meets minimum threshold
        # Guards against accidental alarm deletion after a CDK or console change.
        run: |
          python3 -m pytest tests/test_integration_aws.py::test_i7_cloudwatch_alarms_exist \
            -v --tb=short -m integration 2>&1
          echo "I7 complete"

      - name: I8 — S3 critical config files present
        # board_of_directors.json / character_sheet.json / profile.json must exist.
        run: |
          python3 -m pytest tests/test_integration_aws.py::test_i8_s3_bucket_and_config_files \
            -v --tb=short -m integration 2>&1
          echo "I8 complete"

      - name: I9 — Ingestion DLQ empty (no silent Lambda failures)
        # Non-zero DLQ means a Lambda is silently failing. Hard failure so it’s caught immediately.
        run: |
          python3 -m pytest tests/test_integration_aws.py::test_i9_dlq_empty \
            -v --tb=short -m integration 2>&1
          echo "I9 complete"

      - name: I22 — Live site /version.json SHA on origin/main (#369)
        # Catches main==live divergence after a squash-merge. A benign divergence
        # (main ahead of live) passes; a SHA not in main’s history fails.
        run: |
          python3 -m pytest tests/test_integration_aws.py::test_i22_site_version_sha_on_main \
            -v --tb=short -m integration 2>&1
          echo "I22 complete"

  # ════════════════════════════════════════════════════════════════
  # Job 6: Auto-rollback on smoke failure (TB7-25)
  # Fires when smoke-test fails AFTER a successful deploy.
  # Rolls back each deployed function to its previous S3 artifact.
  # ════════════════════════════════════════════════════════════════
  rollback-on-smoke-failure:
    name: Auto-rollback (smoke failure)
    runs-on: ubuntu-latest
    needs: [plan, deploy, smoke-test]
    # `always() &&` is REQUIRED: a job whose dependency (smoke-test) failed is
    # skipped by default unless its `if` contains a status-check function — so
    # without always() this rollback never actually fires (#418/ADR-117 fix; the
    # bare condition here was previously dormant).
    if: always() && needs.smoke-test.result == 'failure' && needs.deploy.result == 'success'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback deployed Lambdas
        run: |
          MATRIX='${{ needs.plan.outputs.deploy_matrix }}'
          MCP_CHANGED='${{ needs.plan.outputs.mcp_changed }}'
          COUNT=$(echo "$MATRIX" | jq 'length')

          echo "⚠️  Smoke test failed after successful deploy — initiating auto-rollback"
          echo ""

          ROLLED_BACK=0
          FAILED=0

          # Roll back individual Lambdas
          for row in $(echo "$MATRIX" | jq -r '.[] | @base64'); do
            FUNC=$(echo "$row" | base64 -d | jq -r '.function')
            echo "→ Rolling back $FUNC..."
            if bash deploy/rollback_lambda.sh "$FUNC"; then
              ROLLED_BACK=$((ROLLED_BACK + 1))
            else
              echo "  ❌ Rollback failed for $FUNC — manual intervention required"
              FAILED=$((FAILED + 1))
            fi
          done

          # Roll back MCP if it was deployed
          if [ "$MCP_CHANGED" = "true" ]; then
            echo "→ Rolling back life-platform-mcp..."
            if bash deploy/rollback_lambda.sh "life-platform-mcp"; then
              ROLLED_BACK=$((ROLLED_BACK + 1))
            else
              echo "  ❌ MCP rollback failed — manual intervention required"
              FAILED=$((FAILED + 1))
            fi
          fi

          echo ""
          echo "═══ Rollback complete: $ROLLED_BACK succeeded, $FAILED failed ═══"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED Lambda(s) could not be rolled back — manual redeploy required"
            exit 1
          fi

          echo "✅ All Lambdas rolled back. Investigate smoke test failure before re-deploying."

      # #418/ADR-117: every rollback event must produce a notification (no silent
      # revert). (#749/actionlint: the old shared-layer runbook branch here keyed on
      # needs.plan.outputs.layer_changed — an output that no longer exists since the
      # layer was retired (#781), so it could never fire. Removed as dead code; a
      # fleet deploy rolls back per-function like any other code deploy.)
      - name: Notify Lambda/MCP rollback
        if: always()
        run: |
          COMMIT="${{ github.sha }}"; SHORT="${COMMIT:0:7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="AUTO-ROLLBACK (smoke failure) — Lambda/MCP code reverted to previous S3 artifact.
          Commit: $SHORT (${{ github.ref_name }})
          Run: $RUN_URL
          Rollback job result: ${{ job.status }}

          Investigate the smoke-test failure before re-deploying."
          aws sns publish \
            --topic-arn "${{ env.SNS_TOPIC_ARN }}" \
            --subject "Life Platform AUTO-ROLLBACK [$SHORT]" \
            --message "$MESSAGE" \
            --region ${{ env.AWS_REGION }} || echo "::warning::SNS publish failed — rollback still completed"
          echo "✅ Rollback notification sent"

  # ════════════════════════════════════════════════════════════════
  # Job 6b (RETIRED here, #750): the site auto-rollback (#418/ADR-117)
  # moved to .github/workflows/site-deploy.yml with the site deploy it
  # protects — it fires there on a smoke OR visual-QA failure after a
  # successful site deploy, via deploy/rollback_site.sh HEAD~1.
  # ════════════════════════════════════════════════════════════════
  # Job 7: Notify on failure
  # Runs if any upstream job fails. Posts to SNS life-platform-alerts.
  # ════════════════════════════════════════════════════════════════
  notify-failure:
    name: Notify failure
    runs-on: ubuntu-latest
    # #416: include test-critical so a deploy-gating failure also notifies.
    needs: [lint, test-critical, test, plan, deploy, smoke-test]
    if: failure()
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Post failure to SNS
        run: |
          COMMIT="${{ github.sha }}"
          SHORT_COMMIT="${COMMIT:0:7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # (#749/actionlint: the old shared-layer runbook branch keyed on
          # needs.plan.outputs.layer_changed — removed with the layer (#781);
          # it compared an undefined output and could never fire.)
          MESSAGE="CI/CD FAILURE
          Commit: $SHORT_COMMIT (${{ github.ref_name }})
          Run: $RUN_URL
          Triggered by: ${{ github.actor }}

          Check GitHub Actions for details."

          aws sns publish \
            --topic-arn "${{ env.SNS_TOPIC_ARN }}" \
            --subject "Life Platform CI/CD Failed [$SHORT_COMMIT]" \
            --message "$MESSAGE" \
            --region ${{ env.AWS_REGION }}

          echo "✅ Failure notification sent to SNS"
