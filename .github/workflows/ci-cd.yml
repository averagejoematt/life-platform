# Life Platform CI/CD Pipeline
# MAINT-4: Automated lint → deploy → smoke test on push to main
#
# Architecture:
#   1. Lint (flake8) — runs on every push, no AWS access needed
#   2. Plan — detects changed files, maps to Lambda functions
#   3. Deploy — requires manual approval (GitHub Environment: production)
#   4. Smoke test — invokes qa-smoke Lambda to verify
#
# AWS auth: OIDC federation (no long-lived keys)
# See deploy/setup_github_oidc.sh to create the IAM provider + role

name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/**'
      - 'mcp/**'
      - 'mcp_server.py'
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy ALL Lambdas (skip change detection)'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-west-2
  LAMBDA_MAP: ci/lambda_map.json

permissions:
  id-token: write   # OIDC token for AWS
  contents: read     # Checkout code

jobs:
  # ════════════════════════════════════════════════════════════════
  # Job 1: Lint
  # ════════════════════════════════════════════════════════════════
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          echo "::group::Linting lambdas/"
          flake8 lambdas/ --count --show-source --statistics || true
          echo "::endgroup::"
          
          echo "::group::Linting mcp/"
          flake8 mcp/ --count --show-source --statistics || true
          echo "::endgroup::"
          
          # Fail on errors (E), pass on warnings (W)
          flake8 lambdas/ mcp/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # ════════════════════════════════════════════════════════════════
  # Job 2: Plan — detect changes, map to Lambdas
  # ════════════════════════════════════════════════════════════════
  plan:
    name: Plan deployments
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      deploy_matrix: ${{ steps.plan.outputs.matrix }}
      has_deploys: ${{ steps.plan.outputs.has_deploys }}
      layer_changed: ${{ steps.plan.outputs.layer_changed }}
      mcp_changed: ${{ steps.plan.outputs.mcp_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need HEAD~1 for diff

      - name: Detect changes and build deploy plan
        id: plan
        run: |
          set -e
          
          # Get changed files
          if [ "${{ github.event.inputs.deploy_all }}" = "true" ]; then
            echo "Manual deploy-all triggered — deploying everything"
            CHANGED=$(find lambdas/ mcp/ -name '*.py' -type f)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- lambdas/ mcp/ mcp_server.py 2>/dev/null || \
                      find lambdas/ mcp/ -name '*.py' -type f)
          fi
          
          echo "Changed files:"
          echo "$CHANGED" | head -50
          
          # Load lambda map
          LAMBDA_MAP_FILE="${{ env.LAMBDA_MAP }}"
          
          # Check for shared layer changes
          LAYER_CHANGED="false"
          LAYER_MODULES=$(jq -r '.shared_layer.modules[]' "$LAMBDA_MAP_FILE")
          for mod in $LAYER_MODULES; do
            if echo "$CHANGED" | grep -qx "$mod"; then
              LAYER_CHANGED="true"
              echo "⚡ Shared layer module changed: $mod"
              break
            fi
          done
          echo "layer_changed=$LAYER_CHANGED" >> "$GITHUB_OUTPUT"
          
          # Check for MCP changes
          MCP_CHANGED="false"
          if echo "$CHANGED" | grep -q "^mcp/" || echo "$CHANGED" | grep -q "mcp_server.py"; then
            MCP_CHANGED="true"
            echo "⚡ MCP server changed"
          fi
          echo "mcp_changed=$MCP_CHANGED" >> "$GITHUB_OUTPUT"
          
          # Build deploy matrix: list of {function, source} pairs
          DEPLOYS="[]"
          
          # Direct Lambda source file changes
          for file in $CHANGED; do
            FUNC=$(jq -r --arg f "$file" '.lambdas[$f].function // empty' "$LAMBDA_MAP_FILE")
            if [ -n "$FUNC" ]; then
              DEPLOYS=$(echo "$DEPLOYS" | jq --arg fn "$FUNC" --arg src "$file" '. + [{"function": $fn, "source": $src}]')
            fi
          done
          
          # If shared layer changed, add all consumer Lambdas
          if [ "$LAYER_CHANGED" = "true" ]; then
            CONSUMERS=$(jq -r '.shared_layer.consumers[]' "$LAMBDA_MAP_FILE")
            for consumer in $CONSUMERS; do
              # Find source file for this consumer
              SRC=$(jq -r --arg fn "$consumer" '[.lambdas | to_entries[] | select(.value.function == $fn) | .key] | first // empty' "$LAMBDA_MAP_FILE")
              if [ -n "$SRC" ]; then
                # Avoid duplicates
                EXISTS=$(echo "$DEPLOYS" | jq --arg fn "$consumer" '[.[] | select(.function == $fn)] | length')
                if [ "$EXISTS" = "0" ]; then
                  DEPLOYS=$(echo "$DEPLOYS" | jq --arg fn "$consumer" --arg src "$SRC" '. + [{"function": $fn, "source": $src}]')
                fi
              fi
            done
          fi
          
          # Deduplicate
          DEPLOYS=$(echo "$DEPLOYS" | jq 'unique_by(.function)')
          
          COUNT=$(echo "$DEPLOYS" | jq 'length')
          echo "📋 Deploy plan: $COUNT Lambda(s)"
          echo "$DEPLOYS" | jq -r '.[] | "  → \(.function) (\(.source))"'
          
          HAS_DEPLOYS="false"
          if [ "$COUNT" -gt 0 ] || [ "$MCP_CHANGED" = "true" ]; then
            HAS_DEPLOYS="true"
          fi
          
          echo "has_deploys=$HAS_DEPLOYS" >> "$GITHUB_OUTPUT"
          echo "matrix=$(echo "$DEPLOYS" | jq -c '.')" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════════
  # Job 3: Deploy (manual approval gate)
  # ════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.has_deploys == 'true'
    environment: production   # ← Manual approval gate
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::205930651321:role/github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      # ── Rebuild shared layer if needed ──
      - name: Rebuild shared layer
        if: needs.plan.outputs.layer_changed == 'true'
        run: |
          echo "═══ Rebuilding shared utils layer ═══"
          bash deploy/p3_build_shared_utils_layer.sh
          
          # Capture the new layer ARN from the script output
          LAYER_ARN=$(aws lambda list-layer-versions \
            --layer-name life-platform-shared-utils \
            --region ${{ env.AWS_REGION }} \
            --query 'LayerVersions[0].LayerVersionArn' \
            --output text)
          echo "New layer: $LAYER_ARN"
          
          echo "Attaching to consumers..."
          bash deploy/p3_attach_shared_utils_layer.sh "$LAYER_ARN"

      # ── Deploy MCP server if needed ──
      - name: Deploy MCP server
        if: needs.plan.outputs.mcp_changed == 'true'
        run: |
          echo "═══ Deploying MCP server ═══"
          
          WORK_DIR=$(mktemp -d)
          
          # Get handler config
          HANDLER=$(aws lambda get-function-configuration \
            --function-name life-platform-mcp \
            --region ${{ env.AWS_REGION }} \
            --query "Handler" --output text)
          MODULE_NAME=$(echo "$HANDLER" | cut -d'.' -f1)
          
          # Package: mcp_server.py + full mcp/ directory
          cp mcp_server.py "$WORK_DIR/${MODULE_NAME}.py"
          cp -r mcp/ "$WORK_DIR/mcp/"
          
          (cd "$WORK_DIR" && zip -r deploy.zip "${MODULE_NAME}.py" mcp/ -q)
          
          aws lambda update-function-code \
            --function-name life-platform-mcp \
            --zip-file "fileb://$WORK_DIR/deploy.zip" \
            --region ${{ env.AWS_REGION }} > /dev/null
          
          echo "✅ life-platform-mcp deployed"
          rm -rf "$WORK_DIR"
          sleep 10

      # ── Deploy individual Lambdas ──
      - name: Deploy Lambdas
        run: |
          MATRIX='${{ needs.plan.outputs.deploy_matrix }}'
          COUNT=$(echo "$MATRIX" | jq 'length')
          
          if [ "$COUNT" = "0" ]; then
            echo "No individual Lambdas to deploy"
            exit 0
          fi
          
          echo "═══ Deploying $COUNT Lambda(s) ═══"
          
          DEPLOYED=0
          FAILED=0
          
          for row in $(echo "$MATRIX" | jq -r '.[] | @base64'); do
            FUNC=$(echo "$row" | base64 -d | jq -r '.function')
            SRC=$(echo "$row" | base64 -d | jq -r '.source')
            
            echo ""
            echo "→ Deploying $FUNC from $SRC..."
            
            # Skip garmin (native deps — must be built separately)
            NATIVE=$(jq -r --arg f "$SRC" '.lambdas[$f].native_deps // false' "${{ env.LAMBDA_MAP }}")
            if [ "$NATIVE" = "true" ]; then
              echo "  ⚠️ SKIPPED: $FUNC has native deps (deploy manually)"
              continue
            fi
            
            if bash deploy/deploy_lambda.sh "$FUNC" "$SRC"; then
              echo "  ✅ $FUNC deployed"
              DEPLOYED=$((DEPLOYED + 1))
            else
              echo "  ❌ FAILED: $FUNC"
              FAILED=$((FAILED + 1))
            fi
            
            sleep 10  # Avoid ResourceConflictException
          done
          
          echo ""
          echo "═══ Deploy complete: $DEPLOYED succeeded, $FAILED failed ═══"
          
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED Lambda(s) failed to deploy"
            exit 1
          fi

  # ════════════════════════════════════════════════════════════════
  # Job 4: Smoke test
  # ════════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::205930651321:role/github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Run QA smoke test
        run: |
          echo "Running qa-smoke Lambda..."
          aws lambda invoke \
            --function-name qa-smoke \
            --payload '{}' \
            --region ${{ env.AWS_REGION }} \
            --cli-binary-format raw-in-base64-out \
            /tmp/smoke.json > /dev/null 2>&1
          
          echo "Smoke test result:"
          cat /tmp/smoke.json | python3 -m json.tool 2>/dev/null || cat /tmp/smoke.json
          
          # Check for errors
          if grep -qi "error" /tmp/smoke.json 2>/dev/null; then
            echo "::warning::Smoke test returned errors — check CloudWatch"
          fi
          
          echo ""
          echo "✅ Smoke test complete"

      - name: Verify canary
        run: |
          echo "Checking canary Lambda..."
          aws lambda invoke \
            --function-name life-platform-canary \
            --payload '{}' \
            --region ${{ env.AWS_REGION }} \
            --cli-binary-format raw-in-base64-out \
            /tmp/canary.json > /dev/null 2>&1
          
          cat /tmp/canary.json | python3 -m json.tool 2>/dev/null || cat /tmp/canary.json
          
          if grep -qi "error" /tmp/canary.json 2>/dev/null; then
            echo "::error::Canary failed after deploy"
            exit 1
          fi
          echo "✅ Canary healthy"
