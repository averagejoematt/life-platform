# Golden-brief + golden-surface eval harness (#742 coach briefs; #812 every AI surface) —
# the falsifiable-honesty layer.
#
# The DETERMINISTIC verdicts already gate every deploy: tests/test_golden_brief_eval.py and
# tests/test_golden_surface_eval.py carry the `deploy_critical` marker, so they run in the
# main pipeline's deploy-critical lane on every push and BLOCK deploy if a golden output
# false-flags or a seeded-fault canary slips a gate. This workflow is the WEEKLY complement:
# it re-runs both harnesses on a schedule (catching drift even in weeks with no gate/prompt
# change) and surfaces the advisory Haiku voice-rubric trend.
#
# The scheduled run is deterministic + free (no AWS, no Bedrock). The advisory
# `--judge`/`--emit` path (Bedrock spend + CloudWatch LifePlatform/GoldenBrief metrics) runs
# weekly via the dedicated least-privilege `github-actions-golden-eval-role` (#812 —
# bedrock:InvokeModel on the Haiku profile + namespace-conditioned PutMetricData only; see
# infra/iam/README.md). Until that role is applied in IAM the judge step degrades softly
# (continue-on-error on the credential step) and the deterministic verdict is unaffected.
# See ADR-127.
name: Golden-brief eval

on:
  schedule:
    - cron: '17 15 * * 1'   # Mondays 15:17 UTC — weekly voice/gate drift check
  workflow_dispatch:
    inputs:
      run_judge:
        description: 'Also run the advisory Haiku voice rubric + emit CloudWatch metrics (Bedrock spend)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write   # only used by the advisory judge/emit step
  issues: write     # advisory-failure issue filing (#1447)

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: "205930651321"

jobs:
  golden-brief:
    name: Golden falsifiability check (briefs + all surfaces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pytest boto3 botocore

      - name: Deterministic verdict (gating, free)
        run: |
          echo "::group::Golden-brief deterministic harness"
          python3 tests/golden_brief_eval.py | tee /tmp/golden.txt
          echo "::endgroup::"
          echo "::group::Golden-surface deterministic harness (#812)"
          python3 tests/golden_surface_eval.py | tee /tmp/golden_surfaces.txt
          echo "::endgroup::"
          # first lines are the ops-email lines — surface them in the run summary
          head -1 /tmp/golden.txt >> "$GITHUB_STEP_SUMMARY"
          head -1 /tmp/golden_surfaces.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Self-tests
        run: python3 -m pytest tests/test_golden_brief_eval.py tests/test_golden_surface_eval.py -q

      # ── advisory voice trend + metrics — weekly on schedule, or manual dispatch ──
      - name: Configure AWS (judge/emit)
        id: judge-creds
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_judge) }}
        continue-on-error: true   # role is staged until applied (infra/iam/README.md) — degrade softly
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-golden-eval-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Advisory voice rubric + metric emit
        if: ${{ steps.judge-creds.outcome == 'success' }}
        continue-on-error: true   # advisory: never fails the run (harness is fail-soft too)
        run: |
          echo "::group::Advisory Haiku voice rubric + CloudWatch emit"
          python3 tests/golden_brief_eval.py --judge --emit | tee /tmp/golden_judge.txt
          head -1 /tmp/golden_judge.txt >> "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"

      # #1447 — this workflow gates nothing (the deterministic harnesses gate at
      # deploy time via ci-cd.yml); a red here previously evaporated into run
      # history. File/update ONE deduped auto-filed issue on failure; auto-close
      # it on the next green run. Runs last, always.
      - name: File/resolve advisory failure issue (#1447)
        if: always()
        uses: ./.github/actions/advisory-failure-issue
        with:
          workflow-slug: golden-brief-eval
          workflow-name: Golden-brief eval
          job-status: ${{ job.status }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          failure-summary: >-
            The weekly golden-brief/golden-surface falsifiability re-run (the
            deterministic harnesses tests/golden_brief_eval.py +
            tests/golden_surface_eval.py, or their self-tests) failed on
            schedule — voice/gate drift caught outside the deploy path. The
            advisory Haiku judge steps are continue-on-error and cannot be the
            cause; see the run's step log for which harness redded.
