# Weekly WebKit (iOS-Safari engine) mobile-viewport QA — ADVISORY (#1434)
#
# Real readers are on iOS Safari; every gating sweep (ci-cd.yml, site-deploy.yml,
# the daily visual-qa.yml standalone) drives Chromium with EMULATED mobile
# viewports, so the WebKit-only bug class — backdrop-filter vs position:fixed,
# -webkit- quirks, IntersectionObserver timing (memory: project_mobile_pwa) —
# passes every current gate invisibly. This run drives the SAME
# tests/visual_qa.py harness on Playwright WebKit at an iPhone-class profile
# (390x844, dpr 3, touch) over the qa_manifest tier-1/2 pages (flagship doors +
# live-data topic pages; --max-tier 2 → 60 of 79 sweep defs), weekly.
#
# ADVISORY by construction: this workflow gates nothing, deploys nothing, rolls
# back nothing — there is no rollback job, no deploy step, and nothing `needs:`
# it (tests/test_webkit_weekly_qa.py enforces the contract structurally). A red
# run surfaces loudly via SNS (the visual-qa.yml notify pattern — swap for the
# #1447 issue-on-failure helper when that lands) + the run's step summary and
# screenshot artifact; it must be investigated and fixed forward, never
# auto-acted-on. NOTE for triage: a WebKit red with the daily Chromium run
# green is exactly the signal this run exists for — an engine-specific bug.
# Expect some one-sided noise too (WebKit console/pseudo-element differences);
# advisory status is what makes that acceptable.
#
# Cost (recorded per AC #2): GitHub-hosted ubuntu runner only — no AWS mutation,
# no Bedrock (--ai-qa deliberately NOT passed; the run is $0 beyond CI minutes).
# Estimated ~15-25 min/run (60 pages, WebKit is slower than Chromium per page)
# ≈ 60-100 Actions minutes/month on the weekly cadence; the "Record runtime"
# step writes each run's ACTUAL wall-clock to the step summary so the estimate
# stays honest. OIDC creds are assumed up front (read-only: the #1452 dial read)
# and again on failure to publish SNS.
#
# #1452 — the QA-depth dial (SSM /life-platform/qa-level): this advisory run
# fires only at standard/full; lean/off skip the sweep (logged, green). Fail-open
# standard when the param is unreadable. Deploy-gating QA never reads the dial.
#
# Cron: fixed UTC (repo convention — no DST drift). Tuesday 21:37 UTC — offset
# from every taken slot (Sun 15:00, Mon 15:17, MWF 14:45, monthly 16:23, daily
# 20:07) and deliberately AFTER the daily 20:07 Chromium standalone, so a red
# here while today's Chromium sweep is green cleanly isolates "engine-specific".

name: WebKit mobile QA (weekly advisory)

on:
  workflow_dispatch:
  schedule:
    - cron: '37 21 * * 2'   # Tuesdays 21:37 UTC (fixed UTC — no DST drift)

# Never two WebKit sweeps at once (screenshot artifacts); Chromium sweeps are
# different workflows and overlap harmlessly (read-only against the live site).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: "205930651321"
  SNS_TOPIC_ARN: arn:aws:sns:us-west-2:205930651321:life-platform-alerts-digest

permissions:
  id-token: write   # OIDC token for AWS — used ONLY by the failure-notify SNS publish
  contents: read

jobs:
  webkit-mobile-qa:
    name: WebKit mobile sweep (tier-1/2, live site, advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Configure AWS credentials (OIDC — read-only, for the #1452 dial read)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-diagnosis-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Read the QA-depth dial (#1452 — SSM /life-platform/qa-level, fail-open standard)
        id: dial
        run: |
          # full|standard → run the weekly sweep as normal; lean|off → skip it
          # (this run is advisory Actions-minutes spend, exactly what the dial
          # trades away first). Unreadable/invalid = fail-open to standard,
          # stated here in the log — never a silent default.
          LEVEL=$(aws ssm get-parameter --name /life-platform/qa-level \
            --query Parameter.Value --output text 2>/dev/null || true)
          case "$LEVEL" in
            full|standard|lean|off)
              echo "qa-level=$LEVEL" ;;
            *)
              echo "qa-level unreadable or invalid ('$LEVEL') — fail-open to standard (#1452)"
              LEVEL=standard ;;
          esac
          if [ "$LEVEL" = "lean" ] || [ "$LEVEL" = "off" ]; then
            echo "qa-level=$LEVEL — weekly WebKit sweep SKIPPED (deploy-gating QA is exempt from the dial by design)"
          fi
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"

      - name: Install Playwright + WebKit (the iOS Safari engine)
        if: steps.dial.outputs.level == 'standard' || steps.dial.outputs.level == 'full'
        run: |
          python -m pip install --upgrade pip
          # Same pinned Playwright as the enforced ci-cd.yml gate (CQ-01 class:
          # a different version here would make a red mean "engine version",
          # not "iOS Safari breakage") — test_webkit_weekly_qa.py enforces.
          python -m pip install playwright==1.61.0
          python -m playwright install --with-deps webkit

      - name: Run WebKit mobile sweep (deterministic only — no AI, $0)
        id: sweep
        if: steps.dial.outputs.level == 'standard' || steps.dial.outputs.level == 'full'
        run: |
          START=$(date +%s)
          echo "start=$START" >> "$GITHUB_OUTPUT"
          python3 tests/visual_qa.py --browser webkit --mobile --max-tier 2 --screenshot

      - name: Record runtime (Actions-minutes cost, AC #2 of #1434)
        if: always()
        run: |
          START="${{ steps.sweep.outputs.start }}"
          if [ -n "$START" ]; then
            ELAPSED=$(( $(date +%s) - START ))
            echo "## WebKit mobile QA runtime" >> "$GITHUB_STEP_SUMMARY"
            echo "Sweep wall-clock: ${ELAPSED}s (~$(( (ELAPSED + 59) / 60 )) billable Actions minute(s) for this step; weekly cadence)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload screenshots + report
        if: always()
        # Diagnostics side-channel only — an account-wide artifact-quota
        # exhaustion must never red this run's QA verdict (#1331 class,
        # reference_ci_artifact_quota_rollback).
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webkit-mobile-qa-screenshots
          path: qa-screenshots/
          retention-days: 14

      - name: Configure AWS credentials (OIDC — failure notify only)
        if: failure()
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-diagnosis-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Notify failure (SNS digest — the #1447-equivalent loud surface)
        if: failure()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="WEEKLY WEBKIT MOBILE QA FAILED — the iOS-Safari-engine sweep found something the Chromium gates cannot see.
          Trigger: ${{ github.event_name }}
          Run: $RUN_URL

          If today's daily Chromium standalone (visual-qa.yml) is green, this is an ENGINE-SPECIFIC regression (the backdrop-filter/position:fixed class) — check the webkit-mobile-qa-screenshots artifact on the run.
          This run is ADVISORY: it gates nothing and rolls back nothing — investigate and fix forward."
          aws sns publish \
            --topic-arn "${{ env.SNS_TOPIC_ARN }}" \
            --subject "Life Platform weekly WebKit mobile QA FAILED" \
            --message "$MESSAGE" \
            --region ${{ env.AWS_REGION }} || echo "::warning::SNS publish failed — the run failure is still visible in Actions"
