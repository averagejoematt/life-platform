name: Remediation Agent

# Self-healing ops agent. Triages alarms/QA/CI/DLQ, fixes the safe class via PR,
# reports the rest. Runs on Bedrock via OIDC (no API key). See the plan + the
# taxonomy in docs/REMEDIATION_TAXONOMY.md. Mode is gated by SSM
# /life-platform/remediation-mode (off|shadow|auto) — ships in shadow.

on:
  schedule:
    # ~07:45 PT, Mon/Wed/Fri (was daily). Cost-OPT 2026-06-03: the routine sweep was
    # an agentic Sonnet run that found nothing most days. Urgent alarms still trigger
    # it on-demand via repository_dispatch below, so responsiveness is preserved.
    - cron: "45 14 * * 1,3,5"
  repository_dispatch:
    types: [urgent_alarm]           # from the remediation-dispatcher Lambda (Phase 2)
  workflow_dispatch: {}             # manual test

permissions:
  contents: write                   # push remediation branches
  pull-requests: write              # open PRs (uses the built-in GITHUB_TOKEN — no PAT)
  id-token: write                   # AWS OIDC

concurrency:
  group: remediation
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC → remediation role)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: arn:aws:iam::205930651321:role/github-actions-remediation-role
          aws-region: us-west-2

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install agent runtime
        run: |
          pip install --quiet boto3 claude-agent-sdk pytest flake8
          npm install -g @anthropic-ai/claude-code

      - name: Ensure auto-fix-safe label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create auto-fix-safe --color "0E8A16" \
            --description "Eligible for the remediation auto-merge gate" 2>/dev/null || true
          gh label create needs-review --color "FBCA04" \
            --description "Remediation PR needs human review" 2>/dev/null || true

      - name: Configure git identity
        run: |
          git config user.name "remediation-agent"
          git config user.email "awsdev@mattsusername.com"

      # Weekly (Mondays) read-only "live infra vs. code" drift sweep (#394). Runs BEFORE
      # the agent so its findings (drift-log/latest.json) are ingested into the same
      # curated report. No new always-on infra — it's a step in this existing workflow,
      # and CloudFormation drift-detection API calls are free. Non-gating (continue-on-error).
      - name: Weekly infra drift sentinel
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '45 14 * * 1,3,5')
        continue-on-error: true
        env:
          AWS_REGION: us-west-2
          S3_BUCKET: matthew-life-platform
        run: |
          # Cron fires Mon/Wed/Fri; keep the sentinel weekly by running only on Mondays
          # (or any manual dispatch). date -u +%u == 1 → Monday UTC.
          if [ "$(date -u +%u)" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 deploy/drift_sentinel.py
          else
            echo "not Monday — weekly drift sentinel skipped this run"
          fi

      - name: Run remediation agent
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_REGION: us-west-2
          # Cost-OPT 2026-06-03: triage runs on Haiku-primary (5× cheaper, plenty for
          # alarm/CI/DLQ classification; the auto-merge gate is deterministic so safety
          # doesn't depend on the model). Sonnet stays available for escalation on hard tasks.
          ANTHROPIC_MODEL: us.anthropic.claude-haiku-4-5-20251001-v1:0
          ANTHROPIC_DEFAULT_SONNET_MODEL: us.anthropic.claude-sonnet-4-6
          ANTHROPIC_SMALL_FAST_MODEL: us.anthropic.claude-haiku-4-5-20251001-v1:0
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CDK_ACCOUNT: "205930651321"
          S3_BUCKET: matthew-life-platform
          REMEDIATION_MAX_TURNS: "16"
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: python3 remediation/agent.py

      # Deterministic auto-merge gate. Self-no-ops unless SSM mode=auto.
      # Merges auto-fix-safe PRs that pass allowlist/denylist/diff-bound/lint/unit-tests
      # (since GITHUB_TOKEN PRs don't trigger ci-cd.yml, the gate runs the checks here
      # before merging; CI re-runs them on main, and the production deploy still
      # requires manual approval). Sends the single final email in auto mode.
      - name: Auto-merge gate
        if: always()
        env:
          AWS_REGION: us-west-2
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          S3_BUCKET: matthew-life-platform
        run: python3 remediation/automerge.py
