# secret-scan.yml — credential-pattern secret scanning (gitleaks, #1659).
#
# Closes the #1 gap from the 2026-07-21 engineering-excellence audit: before
# this, NOTHING did credential-pattern detection. tests/leak_token_sweep.py
# (run via `pytest tests/` and the daily visual-QA sweep) is a STRUCTURAL
# literal grep for stale PUBLIC strings (retired launch dates, dead cycle
# counters, tombstone flags) — it was never a secret scanner and stays
# exactly as-is; this workflow is complementary, not a replacement.
#
# CRITICAL SCOPE CHOICE — why this does NOT scan full git history or even
# the full current tree:
#   This repo was PUBLIC before 2026-07-13 (project_repo_visibility memory).
#   Its history AND its currently-committed tree both carry pre-existing
#   credential-shaped strings (reverse-engineered "known" API client
#   secrets for unofficial integrations, a documented-public Firebase web
#   key, test fixtures with fake HMAC secrets — see .gitleaks.toml for the
#   ones actually triaged 2026-07-21). A naive `gitleaks detect` over all
#   history, or even a `--no-git` scan of the whole checked-out tree, would
#   find those on EVERY PR forever and train everyone to ignore a red
#   check. So this gate is scoped to exactly the commit range a PR
#   introduces: `--log-opts="${base}..${head}"`. Verified locally
#   (2026-07-21): `gitleaks detect --log-opts="HEAD~5..HEAD"` reports
#   "N commits scanned" for exactly N, not the whole repo.
#
# Blocking: this job fails (non-zero exit) the moment gitleaks reports a
# finding in the PR's own commits — that is what makes it blocking-capable.
# Wiring it into GitHub branch-protection REQUIRED checks is a separate,
# owner-only step (issue #1662, gate:owner) — repo settings are out of
# scope here.
#
# gitleaks binary is pinned by version + sha256 (not `gitleaks/gitleaks-action`
# floating a tag) so a supply-chain change to the binary can't silently
# change what this gate does.

name: secret scan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.head_ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

jobs:
  gitleaks:
    name: gitleaks (PR commit range only, not full history)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # fetch-depth: 0 so the base/head commits used in --log-opts below are
      # guaranteed present locally (a shallow clone can be missing the merge
      # base). This affects checkout cost only — the SCAN below still walks
      # only the base..head range, never the full history.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          curl -sSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

      - name: gitleaks detect (PR commit range)
        run: |
          set -euo pipefail
          ./gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --redact \
            --verbose
