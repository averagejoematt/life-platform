# Standalone Visual + AI-vision QA (#749)
#
# The reader-facing regression net (Playwright browser sweep + Claude/Bedrock
# semantic vision QA + the deterministic accuracy gate), runnable INDEPENDENTLY
# of the deploy pipeline. Sweeps the LIVE site (https://averagejoematt.com), so
# it needs no build/deploy context — only read access + Bedrock.
#
# Why this exists (issue #749, the "masked gate" class): in ci-cd.yml the
# visual-qa job sits behind lint → test-critical → plan → deploy, so any
# unrelated red upstream — or simply "no deployable change in this push" —
# meant the reader-facing net never fired (offline most of the time across two
# audits). This workflow makes it fire:
#   • on demand (workflow_dispatch — e.g. after a manual site/site-api deploy,
#     or while main is red and the pipeline copy is skipped), and
#   • daily on a schedule, so drift on the live site (stale data renders, chart
#     regressions from generated/ content, upstream data shape changes) is
#     caught even on days with no push at all.
#
# The pipeline copy in ci-cd.yml (job `visual-qa`, needs: deploy) is unchanged
# and still GATES the pipeline post-deploy; this standalone run gates nothing —
# a failure reds this run and notifies SNS (the remediation agent also triages
# failed runs). Steps mirror the pipeline job exactly (same pinned Playwright,
# same OIDC role github-actions-deploy-role, same scripts) so a red here means
# the same thing as a red there. The AI-vision layer self-skips (SKIPPED-BY-BUDGET
# warning) when bedrock:InvokeModel is absent or the budget guard is at tier >= 1
# (internal QA pauses first, ADR-125).
#
# Cron: fixed UTC (repo convention — no DST drift). 20:07 UTC ≈ 12:07/13:07 PT,
# after the 11 AM PT compute/email/OG-image cycle has refreshed the day's data,
# and offset from the taken workflow slots (14:45, 15:17, 16:23 UTC).
#
# #1428 — tiered AI-vision cadence, ONE cron, no new trigger added:
# the deterministic Playwright sweep + --reader-truth run on EVERY fire of the
# existing daily cron (unchanged). The full-surface Claude-vision pass
# (--ai-qa, no tier filter) only runs on the Sunday fire of that SAME cron (day-
# of-week computed at runtime — see the "Determine cadence" step) or on any
# manual workflow_dispatch, so a human triggering this on demand always gets
# the full AI-vision read. Non-Sunday daily fires skip --ai-qa entirely (deploy
# time already covers tier-1 pages via ci-cd.yml/site-deploy.yml's --ai-qa-max-tier
# 1) — this keeps AI-vision spend to exactly two buckets: tier-1 at every deploy,
# full surface once a week. See tests/visual_qa.py's module docstring for the cost math.
#
# #1452 — the QA-depth dial (SSM /life-platform/qa-level = full|standard|lean|off,
# fail-open standard when unreadable, stated in the log): one knob scales THIS
# standalone run (full = AI-vision every fire; lean = deterministic only; off =
# skip) without editing the workflow under pressure. The deploy-gating QA copies
# in ci-cd.yml/site-deploy.yml never read the dial — structurally exempt, the
# deploy gate can never be disabled by it. Docs: docs/RUNBOOK.md § QA Depth Dial.

name: Visual QA (standalone)

on:
  workflow_dispatch:
  schedule:
    - cron: '7 20 * * *'   # daily 20:07 UTC (fixed UTC — no DST drift); the
                            # full AI-vision pass below only fires on the Sunday
                            # occurrence of this SAME cron (#1428) — see the
                            # "Determine cadence" step, no second cron added

# Never two sweeps at once (screenshot artifacts + Bedrock spend); a pipeline
# visual-qa run is a different workflow and may overlap harmlessly (read-only).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: "205930651321"
  SNS_TOPIC_ARN: arn:aws:sns:us-west-2:205930651321:life-platform-alerts-digest

permissions:
  id-token: write   # OIDC token for AWS (Bedrock vision QA + SNS notify)
  contents: read
  issues: write     # advisory-failure issue filing (#1447)

jobs:
  visual-qa:
    name: Visual + AI-vision QA (live site)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright==1.61.0
          python -m playwright install --with-deps chromium

      - name: Configure AWS credentials (OIDC — for Bedrock vision QA)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-diagnosis-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Read the QA-depth dial (#1452 — SSM /life-platform/qa-level, fail-open standard)
        id: dial
        run: |
          # One knob scales the NON-gating QA estate (this standalone run + the
          # weekly WebKit run) up/down without editing workflows under pressure.
          # The deploy-gating QA copies (ci-cd.yml / site-deploy.yml) never read
          # this parameter — the deploy gate can not be disabled by the dial.
          LEVEL=$(aws ssm get-parameter --name /life-platform/qa-level \
            --query Parameter.Value --output text 2>/dev/null || true)
          case "$LEVEL" in
            full|standard|lean|off)
              echo "qa-level=$LEVEL" ;;
            *)
              echo "qa-level unreadable or invalid ('$LEVEL') — fail-open to standard (#1452)"
              LEVEL=standard ;;
          esac
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"

      - name: Determine cadence (#1428 full-surface AI-vision Sunday/manual · #1452 dial scaling)
        id: cadence
        run: |
          LEVEL="${{ steps.dial.outputs.level }}"
          AI=""
          RT="--reader-truth"
          if [ "$LEVEL" = "off" ]; then
            RT=""
            echo "qa-level=off — standalone sweep + accuracy gate SKIPPED (deploy-gating QA is exempt from the dial by design)"
          elif [ "$LEVEL" = "lean" ]; then
            RT=""
            echo "qa-level=lean — deterministic sweep only (AI-vision + reader-truth stripped; \$0 Bedrock)"
          elif [ "$LEVEL" = "full" ]; then
            AI="--ai-qa"
            echo "qa-level=full — full-surface AI-vision pass on EVERY fire (not just Sunday/manual)"
          else
            # standard = the pre-#1452 behavior: UTC day-of-week 7 = Sunday. A manual
            # workflow_dispatch always gets the full AI-vision pass, never partial.
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(date -u +%u)" = "7" ]; then
              AI="--ai-qa"
              echo "Full-surface AI-vision pass: ON (${{ github.event_name }}, UTC day $(date -u +%u))"
            else
              echo "Full-surface AI-vision pass: OFF (deterministic + reader-truth only; UTC day $(date -u +%u), not Sunday)"
            fi
          fi
          echo "ai_qa_flag=$AI" >> "$GITHUB_OUTPUT"
          echo "reader_truth_flag=$RT" >> "$GITHUB_OUTPUT"

      - name: Run visual + AI-vision QA sweep
        if: steps.dial.outputs.level != 'off'
        run: |
          python3 tests/visual_qa.py --screenshot ${{ steps.cadence.outputs.ai_qa_flag }} ${{ steps.cadence.outputs.reader_truth_flag }}

      - name: Accuracy gate (per-page resolves + no impossible numbers)
        if: always() && steps.dial.outputs.level != 'off'
        run: |
          python3 tests/accuracy_audit.py --live

      - name: Upload screenshots + report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-qa-standalone-screenshots
          path: qa-screenshots/
          retention-days: 14

      - name: Notify failure (SNS digest)
        if: failure()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="STANDALONE VISUAL-QA FAILURE — the live-site reader-facing sweep found a regression (no deploy involved).
          Trigger: ${{ github.event_name }}
          Run: $RUN_URL

          Screenshots + report are attached to the run as the visual-qa-standalone-screenshots artifact.
          This run gates nothing and rolls back nothing — investigate and fix forward."
          aws sns publish \
            --topic-arn "${{ env.SNS_TOPIC_ARN }}" \
            --subject "Life Platform standalone visual-QA FAILED" \
            --message "$MESSAGE" \
            --region ${{ env.AWS_REGION }} || echo "::warning::SNS publish failed — the run failure is still visible in Actions"

      # #1447 — a red here is advisory (gates nothing), so make it a tracked
      # work item: file/update ONE deduped auto-filed issue on failure, and
      # auto-close it on the next green run. Runs last, always.
      - name: File/resolve advisory failure issue (#1447)
        if: always()
        uses: ./.github/actions/advisory-failure-issue
        with:
          workflow-slug: visual-qa-standalone
          workflow-name: Visual QA (standalone)
          job-status: ${{ job.status }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          failure-summary: >-
            The daily live-site sweep (Playwright deterministic + reader-truth,
            plus the Sunday/manual full-surface AI-vision pass and the accuracy
            gate) failed against https://averagejoematt.com. Screenshots + report
            are attached to the run as the visual-qa-standalone-screenshots
            artifact. This run gates nothing and rolls back nothing — investigate
            and fix forward.
