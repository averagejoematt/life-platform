# Dependabot — automated dependency-update PRs (2026-06-09, Tier-1 hardening).
# Actions are SHA-pinned; Dependabot bumps the SHA + version comment for us.
# Lambda runtime deps are stdlib-only (no requirements there) — only the dev +
# CDK toolchains are tracked.
version: 2
updates:
  # GitHub Actions — keep the SHA-pinned actions current + patched.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns: ["*"]

  # Dev/test toolchain (requirements-dev.txt: ruff, black, mypy, pytest, …).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps-dev)"
    groups:
      dev-tooling:
        patterns: ["*"]
    ignore:
      # The formatters/linters are version-pinned in BOTH requirements-dev.txt
      # AND inline in ci-cd.yml (the format gate installs exact versions). A black
      # or ruff bump that reformats code is a deliberate "reformat the whole repo +
      # move both pins in lockstep" event, NOT a routine auto-bump — left to
      # Dependabot it silently drifts `make format` from CI and red-walls the next
      # push. So ignore ruff/black minor+major here; patch bumps still flow.
      - dependency-name: "ruff"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "black"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # CDK toolchain (cdk/requirements.txt: aws-cdk-lib, constructs).
  - package-ecosystem: "pip"
    directory: "/cdk"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps-cdk)"
